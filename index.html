<head>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #eeece6;
    --text-primary: #1a1a18; --text-secondary: #6b6b67; --text-tertiary: #9b9b96;
    --border-tertiary: rgba(0,0,0,0.12); --border-secondary: rgba(0,0,0,0.22);
    --border-primary: rgba(0,0,0,0.35); --radius-md: 8px; --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c; --bg-secondary: #2a2a28; --bg-tertiary: #333330;
      --text-primary: #f0ede6; --text-secondary: #a0a09a; --text-tertiary: #6a6a64;
      --border-tertiary: rgba(255,255,255,0.1); --border-secondary: rgba(255,255,255,0.18); --border-primary: rgba(255,255,255,0.28);
    }
  }
  body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; }
  #root { max-width: 1000px; margin: 0 auto; padding: 1.5rem 1rem; }
  input, textarea, select { font-family: var(--font); background: var(--bg-primary); color: var(--text-primary); border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-md); padding: 5px 9px; font-size: 13px; outline: none; transition: border-color 0.15s; }
  input:focus, textarea:focus, select:focus { border-color: var(--border-secondary); }
  button { font-family: var(--font); cursor: pointer; }
  textarea { resize: vertical; line-height: 1.5; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-secondary); border-radius: 99px; }
  .tab-bar { display: flex; gap: 4px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .tab-btn { font-size: 13px; padding: 6px 16px; border-radius: var(--radius-md); font-weight: 400; border: 0.5px solid var(--border-secondary); background: var(--bg-primary); color: var(--text-primary); transition: all 0.15s; }
  .tab-btn.active { font-weight: 500; border: 1.5px solid var(--border-primary); background: var(--bg-secondary); }
  .card { background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-lg); padding: 1rem; }
  .card-secondary { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 1rem; }
  .stat-grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1rem; }
  .stat-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1rem; }
  .stat-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 0.75rem 1rem; }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 500; }
  .pill { font-size: 11px; padding: 2px 9px; border-radius: 99px; font-weight: 500; white-space: nowrap; display: inline-block; }
  .flag-badge { background: #FCEBEB; color: #A32D2D; border-radius: 6px; padding: 6px 10px; font-size: 12px; margin-bottom: 6px; display: flex; gap: 6px; }
  .inline-btn { font-size: 11px; padding: 3px 8px; border-radius: 6px; border: 0.5px solid var(--border-secondary); background: none; color: var(--text-secondary); }
  .inline-btn:hover { background: var(--bg-secondary); }
  .del-btn { font-size: 11px; padding: 3px 8px; border-radius: 6px; border: 0.5px solid #F09595; background: none; color: #A32D2D; }
  .add-btn { font-size: 12px; padding: 4px 12px; border-radius: 6px; border: 0.5px solid var(--border-secondary); background: var(--bg-secondary); color: var(--text-secondary); margin-top: 4px; }
  .primary-btn { font-size: 13px; padding: 7px 16px; border-radius: var(--radius-md); border: 0.5px solid var(--border-secondary); background: var(--bg-secondary); color: var(--text-primary); }
  .section-row { background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 0.75rem 1rem; flex-wrap: wrap; }
  .kanban-board { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 8px; align-items: start; }
  .kanban-col { border-radius: 10px; padding: 0.75rem; min-height: 160px; }
  .kanban-card { border-radius: 8px; padding: 0.625rem 0.75rem; margin-bottom: 8px; cursor: grab; user-select: none; border: 0.5px solid var(--border-tertiary); }
  .kanban-card:active { cursor: grabbing; opacity: 0.85; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
  .owner-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .owner-tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .sync-bar { font-size: 11px; display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  @media (max-width: 700px) {
    .stat-grid-4 { grid-template-columns: repeat(2,1fr); }
    .two-col { grid-template-columns: 1fr; }
    .kanban-board { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>

// --- UI Primitives ---
function StatusPill({status,small}) {
  const s=SS[status]||SS["Not Started"];
  return <span className="pill" style={{fontSize:small?11:12,background:s.bg,color:s.text,border:`1px solid ${s.border}`}}>{status}</span>;
}
function Pill({label,bg,text}) { return <span className="pill" style={{background:bg,color:text}}>{label}</span>; }
function FlagBadge({text}) { if(!text) return null; return <div className="flag-badge"><span>⚑</span><span>{text}</span></div>; }
function OwnerTag({owner}) {
  const parts=owner.split("+").map(p=>p.trim());
  return <div className="owner-tags">{parts.map(p=>{const c=OC[p]||"#888";return <span key={p} className="owner-tag" style={{background:c+"18",border:`1px solid ${c}44`,color:c}}>{p}</span>;})}</div>;
}
function Sel({value,options,onChange,small}) {
  return <select value={value} onChange={e=>onChange(e.target.value)} style={{fontSize:small?11:12,padding:"2px 4px"}}>{options.map(o=><option key={o}>{o}</option>)}</select>;
}
function Txt({value,onChange,multi,style={}}) {
  const s={fontSize:13,width:"100%",lineHeight:1.5,...style};
  return multi?<textarea value={value} onChange={e=>onChange(e.target.value)} rows={2} style={s}/>:<input value={value} onChange={e=>onChange(e.target.value)} style={s}/>;
}
function StatCard({label,val,color}) {
  return <div className="stat-card"><div className="stat-label">{label}</div><div className="stat-val" style={{color:color||"var(--text-primary)"}}>{val}</div></div>;
}
function SyncBar({status}) {
  const map={idle:{},syncing:{dot:"#EF9F27",msg:"Syncing…"},saved:{dot:"#1D9E75",msg:"Saved ✓"},error:{dot:"#A32D2D",msg:"Sync failed — check connection"}};
  const s=map[status]||{};
  if(!s.msg) return null;
  return <div className="sync-bar"><span className="sync-dot" style={{background:s.dot}}/><span style={{color:s.dot,fontSize:11}}>{s.msg}</span></div>;
}

// --- Dashboard ---
function Dashboard({sections,actions}) {
  const total=sections.length, done=sections.filter(s=>s.status==="Done").length;

  const pct=Math.round((done/total)*100);
  const allT=sections.flatMap(s=>s.tasks.map(t=>({...t,section:s.title,sn:s.num,prio:s.prio})));
  const actT=allT.filter(t=>["In Progress","In Cleanup"].includes(t.status));
  const openA=actions.filter(a=>a.type==="action"&&a.status!=="Done");
  const openQ=actions.filter(a=>a.type==="question"&&a.status!=="Done");
  const flags=sections.filter(s=>s.flag);
  const bc=pct>=70?"#1D9E75":pct>=40?"#378ADD":"#BA7517";
  const om={};
  sections.forEach(s=>s.owner.split("+").map(o=>o.trim()).forEach(o=>{if(!om[o])om[o]={total:0,done:0,actv:0};om[o].total++;if(s.status==="Done")om[o].done++;if(["In Progress","In Cleanup","Collecting"].includes(s.status))om[o].actv++;}));

    <div>

        </div>

          <div style={{height:"100%",width:`${pct}%`,background:bc,borderRadius:99}}/>
        </div>
        <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
          {[["Done",done,"#EAF3DE","#3B6D11"],["Active",actv,"#E6F1FB","#185FA5"],["Not Started",ns,"#F1EFE8","#5F5E5A"],["Blocked",blkd,"#FCEBEB","#A32D2D"]].map(([l,v,bg,c])=>(
            <span key={l} className="pill" style={{fontSize:11,padding:"3px 10px",background:bg,color:c}}>{l}: {v}</span>
          ))}
        </div>
      </div>
      <div className="stat-grid-4">
        <StatCard label="Total tasks"    val={allT.length}/>
        <StatCard label="Active tasks"   val={actT.length}  color="#185FA5"/>
        <StatCard label="Open actions"   val={openA.length} color="#633806"/>
        <StatCard label="Open questions" val={openQ.length} color="#3C3489"/>
      </div>
      <div className="two-col">
        <div className="card">
          <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Active tasks</div>
          {actT.length===0&&<div style={{fontSize:12,color:"var(--text-tertiary)"}}>No active tasks.</div>}
          {actT.map((t,i)=>(
            <div key={i} style={{borderBottom:"0.5px solid var(--border-tertiary)",paddingBottom:8,marginBottom:8}}>
              <div style={{display:"flex",gap:6,marginBottom:3,flexWrap:"wrap"}}><StatusPill status={t.status} small/><Pill label={t.prio} bg={PS[t.prio]?.bg} text={PS[t.prio]?.text}/></div>
              <div style={{fontSize:12,lineHeight:1.4,marginBottom:2}}>{t.task}</div>
              <div style={{fontSize:11,color:"var(--text-tertiary)"}}>§{t.sn} {t.section}</div>
            </div>
          ))}
        </div>
        <div className="card">
          <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Open actions</div>
          {openA.length===0&&<div style={{fontSize:12,color:"var(--text-tertiary)"}}>All actions complete!</div>}
          {openA.slice(0,7).map((a,i)=>(
            <div key={i} style={{borderBottom:"0.5px solid var(--border-tertiary)",paddingBottom:8,marginBottom:8}}>
              <div style={{display:"flex",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                <span className="pill" style={{fontSize:11,background:(ASC[a.status]||"#888")+"22",color:ASC[a.status]||"#888"}}>{a.status}</span>
                <span style={{fontSize:11,color:"var(--text-tertiary)"}}>{a.due}</span>
              </div>
              <div style={{fontSize:12,lineHeight:1.4,marginBottom:4}}>{a.action}</div>
              <OwnerTag owner={a.owner}/>
            </div>
          ))}
          {openA.length>7&&<div style={{fontSize:11,color:"var(--text-secondary)"}}>+{openA.length-7} more in Action Items tab</div>}
        </div>
      </div>
      <div className="card" style={{marginBottom:"1rem"}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Owner workload</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
          {["David","Steven","Stefan","Tom"].map(name=>{
            const d=om[name]||{total:0,done:0,actv:0};
            const p=d.total>0?Math.round((d.done/d.total)*100):0;
            const c=OC[name];
            const myA=actions.filter(a=>a.owner.includes(name)&&a.type==="action"&&a.status!=="Done");
            return (
              <div key={name} className="card-secondary" style={{padding:"0.75rem"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:c+"22",border:`1.5px solid ${c}66`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:c}}>{name[0]}</div>
                  <span style={{fontSize:13,fontWeight:500}}>{name}</span>
                </div>
                <div style={{fontSize:11,color:"var(--text-secondary)",marginBottom:6}}>{d.total} sections · {d.actv} active · {myA.length} actions</div>
                <div style={{height:5,background:"var(--bg-primary)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${p}%`,background:c,borderRadius:99}}/></div>
                <div style={{fontSize:11,color:"var(--text-tertiary)",marginTop:3}}>{p}% sections complete</div>
              </div>
            );
          })}
        </div>
      </div>
      {flags.length>0&&(
        <div className="card">
          <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>Active flags & blockers</div>
          {flags.map((s,i)=><FlagBadge key={i} text={`§${s.num} ${s.title}: ${s.flag}`}/>)}
        </div>
      )}
    </div>
  );
}

// --- Kanban ---
function Kanban({sections,setSections}) {
  const di=useRef(null);
  const onDS=(e,i)=>{di.current=i;e.dataTransfer.effectAllowed="move";};
  const onDrop=(e,col)=>{e.preventDefault();if(di.current===null)return;const n=[...sections];n[di.current]={...n[di.current],status:col};setSections(n);di.current=null;};
  const onDO=e=>e.preventDefault();
  return (
    <div>
      <div style={{fontSize:12,color:"var(--text-secondary)",marginBottom:12}}>Drag cards between columns or use the dropdown on each card. Changes sync to all team members.</div>
      <div className="kanban-board">
        {KANBAN_COLS.map(col=>{
          const cs=SS[col], colS=sections.filter(s=>s.status===col);
          return (
            <div key={col} className="kanban-col" style={{background:"var(--bg-secondary)"}} onDragOver={onDO} onDrop={e=>onDrop(e,col)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:12,fontWeight:500,color:cs.text}}>{col}</span>
                <span className="pill" style={{fontSize:11,background:cs.bg,color:cs.text,border:`1px solid ${cs.border}`}}>{colS.length}</span>
              </div>
              {colS.map(s=>{
                const gi=sections.findIndex(x=>x.num===s.num);
                const td=s.tasks.filter(t=>t.status==="Done").length;
                const tp=s.tasks.length>0?Math.round((td/s.tasks.length)*100):0;
                const oc=OC[s.owner.split(/[+ ]/)[0]]||"#888";
                return (
                  <div key={String(s.num)} className="kanban-card" style={{background:"var(--bg-primary)"}} draggable onDragStart={e=>onDS(e,gi)}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5,gap:4}}>
                      <span style={{fontSize:11,fontWeight:500,lineHeight:1.3}}>§{s.num} {s.title}</span>
                      <Pill label={s.prio} bg={PS[s.prio]?.bg} text={PS[s.prio]?.text}/>
                    </div>
                    <OwnerTag owner={s.owner}/>
                    {s.flag&&<div style={{fontSize:10,color:"#A32D2D",background:"#FCEBEB",borderRadius:4,padding:"2px 6px",marginTop:5}}>⚑ Flagged</div>}
                    <div style={{marginTop:6,fontSize:10,color:"var(--text-tertiary)",marginBottom:3}}>{td}/{s.tasks.length} tasks done</div>
                    <div style={{height:3,background:"var(--bg-secondary)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${tp}%`,background:oc,borderRadius:99}}/></div>
                    <div style={{marginTop:6}}>
                      <Sel value={s.status} options={ALL_STATUSES} onChange={v=>{const n=[...sections];n[gi]={...n[gi],status:v};setSections(n);}} small/>
                    </div>
                  </div>
                );
              })}
              {colS.length===0&&<div style={{fontSize:11,color:"var(--text-tertiary)",textAlign:"center",padding:"1rem 0",opacity:0.4}}>Drop here</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// --- Project Plan ---
function ProjectPlan({sections,setSections}) {
  const [open,setOpen]=useState(null);
  const upd=(i,f,v)=>{const n=[...sections];n[i]={...n[i],[f]:v};setSections(n);};
  const updT=(si,ti,f,v)=>{const n=[...sections];const t=[...n[si].tasks];t[ti]={...t[ti],[f]:v};n[si]={...n[si],tasks:t};setSections(n);};
  const addT=si=>{const n=[...sections];n[si].tasks=[...n[si].tasks,{task:"New task",status:"Not Started"}];setSections(n);};
  const rmT=(si,ti)=>{const n=[...sections];n[si].tasks=n[si].tasks.filter((_,j)=>j!==ti);setSections(n);};
  return (
    <div>
      <div className="stat-grid-4">
        <StatCard label="Sections" val={sections.length}/>
        <StatCard label="Prio 1"   val={sections.filter(s=>s.prio==="P1").length}  color="#A32D2D"/>
        <StatCard label="Active"   val={sections.filter(s=>["In Progress","In Cleanup","Collecting"].includes(s.status)).length} color="#185FA5"/>
        <StatCard label="Done"     val={sections.filter(s=>s.status==="Done").length} color="#3B6D11"/>
      </div>
      {sections.map((s,si)=>(
        <div key={si} className="section-row">
          <div className="section-header">
            <span style={{fontSize:12,color:"var(--text-tertiary)",minWidth:20}}>{s.num}</span>
            <span style={{fontSize:13,fontWeight:500,flex:1}}>{s.title}</span>
            <OwnerTag owner={s.owner}/>
            <Sel value={s.prio}   options={ALL_PRIORITIES} onChange={v=>upd(si,"prio",v)}   small/>
            <Sel value={s.status} options={ALL_STATUSES}   onChange={v=>upd(si,"status",v)} small/>
            <button onClick={()=>setOpen(open===si?null:si)} style={{fontSize:12,background:"none",border:"none",color:"var(--text-tertiary)",padding:0}}>{open===si?"▲":"▼"}</button>
          </div>
          {open===si&&(
            <div style={{padding:"0 1rem 1rem",borderTop:"0.5px solid var(--border-tertiary)"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10,marginBottom:10}}>
                <div><div style={{fontSize:11,color:"var(--text-secondary)",marginBottom:4}}>Owner</div><Sel value={s.owner} options={OWNERS} onChange={v=>upd(si,"owner",v)}/></div>
                <div><div style={{fontSize:11,color:"var(--text-secondary)",marginBottom:4}}>Flag / blocker</div><Txt value={s.flag} onChange={v=>upd(si,"flag",v)}/></div>
              </div>
              {s.flag&&<FlagBadge text={s.flag}/>}
              <div style={{fontSize:11,color:"var(--text-secondary)",marginBottom:6}}>Tasks</div>
              {s.tasks.map((t,ti)=>(
                <div key={ti} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <Sel value={t.status} options={ALL_STATUSES} onChange={v=>updT(si,ti,"status",v)} small/>
                  <Txt value={t.task} onChange={v=>updT(si,ti,"task",v)} style={{fontSize:12}}/>
                  <button className="del-btn" onClick={()=>rmT(si,ti)} style={{padding:"2px 7px",fontSize:14,border:"none"}}>×</button>
                </div>
              ))}
              <button className="add-btn" onClick={()=>addT(si)}>+ Add task</button>
              <div style={{marginTop:10}}><div style={{fontSize:11,color:"var(--text-secondary)",marginBottom:4}}>Notes</div><Txt value={s.notes} onChange={v=>upd(si,"notes",v)} multi/></div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// --- Action Items ---
function ActionItems({actions,setActions}) {
  const [editId,setEditId]=useState(null);
  const [view,setView]=useState("action");
  const upd=(id,f,v)=>setActions(prev=>prev.map(a=>a.id===id?{...a,[f]:v}:a));
  const add=type=>{const id=Math.max(0,...actions.map(a=>a.id))+1;setActions([...actions,{id,owner:"David",action:type==="question"?"New open question":"New action item",due:"TBD",dep:"",status:type==="question"?"Decision Needed":"Committed",type}]);};
  const rm=id=>setActions(prev=>prev.filter(a=>a.id!==id));
  const filtered=actions.filter(a=>a.type===view);
  const ac=actions.filter(a=>a.type==="action"), qc=actions.filter(a=>a.type==="question");
  return (
    <div>
      <div style={{display:"flex",gap:4,marginBottom:"1.25rem"}}>
        {[["action","Action Items"],["question","Open Questions"]].map(([v,l])=>(
          <button key={v} className={`tab-btn ${view===v?"active":""}`} onClick={()=>setView(v)}>{l}</button>
        ))}
      </div>
      {view==="action"&&<div className="stat-grid-4">
        <StatCard label="Total"           val={ac.length}/>
        <StatCard label="Urgent"          val={ac.filter(a=>a.status==="Urgent").length}          color="#A32D2D"/>
        <StatCard label="Decision needed" val={ac.filter(a=>a.status==="Decision Needed").length} color="#633806"/>
        <StatCard label="Done"            val={ac.filter(a=>a.status==="Done").length}            color="#3B6D11"/>
      </div>}
      {view==="question"&&<div className="stat-grid-3">
        <StatCard label="Total"    val={qc.length}/>
        <StatCard label="Open"     val={qc.filter(a=>a.status!=="Done").length} color="#3C3489"/>
        <StatCard label="Resolved" val={qc.filter(a=>a.status==="Done").length} color="#3B6D11"/>
      </div>}
      {filtered.map(a=>(
        <div key={a.id} style={{background:"var(--bg-primary)",border:`0.5px solid ${a.status==="Urgent"?"#F09595":a.status==="Done"?"#97C459":a.type==="question"?"#AFA9EC":"var(--border-tertiary)"}`,borderRadius:8,padding:"0.75rem 1rem",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                {a.type==="question"&&<span className="pill" style={{fontSize:11,background:"#EEEDFE",color:"#3C3489"}}>?</span>}
                <Sel value={a.status} options={a.type==="question"?["Decision Needed","In Progress","Done"]:ALL_ACTION_STATUSES} onChange={v=>upd(a.id,"status",v)} small/>
                {editId===a.id?<Sel value={a.owner} options={OWNERS} onChange={v=>upd(a.id,"owner",v)} small/>:<OwnerTag owner={a.owner}/>}
                {editId===a.id?<Txt value={a.due} onChange={v=>upd(a.id,"due",v)} style={{fontSize:11,width:100}}/>:<span style={{fontSize:11,color:"var(--text-tertiary)"}}>Due: {a.due}</span>}
              </div>
              {editId===a.id?<Txt value={a.action} onChange={v=>upd(a.id,"action",v)} multi/>:<div style={{fontSize:13,color:a.status==="Done"?"var(--text-secondary)":"var(--text-primary)",textDecoration:a.status==="Done"?"line-through":"none",lineHeight:1.5}}>{a.action}</div>}
              {editId===a.id&&a.type==="action"&&<div style={{marginTop:6}}><div style={{fontSize:11,color:"var(--text-secondary)",marginBottom:3}}>Dependency</div><Txt value={a.dep} onChange={v=>upd(a.id,"dep",v)} style={{fontSize:12}}/></div>}
              {a.dep&&editId!==a.id&&<div style={{fontSize:11,color:"#633806",background:"#FAEEDA",borderRadius:4,padding:"3px 8px",marginTop:6,display:"inline-block"}}>◆ {a.dep}</div>}
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}}>
              <button className="inline-btn" onClick={()=>setEditId(editId===a.id?null:a.id)}>{editId===a.id?"Done":"Edit"}</button>
              <button className="del-btn" onClick={()=>rm(a.id)}>×</button>
            </div>
          </div>
        </div>
      ))}
      <button className="primary-btn" onClick={()=>add(view)} style={{marginTop:4}}>+ Add {view==="question"?"open question":"action item"}</button>
    </div>
  );
}

// --- Root ---
function App() {
  const [tab,setTab]=useState(0);
  const [sections,setSectionsState]=useState(DEF_SECTIONS);
  const [actions,setActionsState]=useState(DEF_ACTIONS);
  const [loaded,setLoaded]=useState(false);
  const [syncStatus,setSyncStatus]=useState("idle");
  const timer=useRef(null);

  useEffect(()=>{
    dbGet().then(data=>{
      if(data?.sections) setSectionsState(data.sections);
      if(data?.actions)  setActionsState(data.actions);
      setLoaded(true);
    }).catch(()=>setLoaded(true));
  },[]);

  const persist=useCallback((s,a)=>{
    if(timer.current) clearTimeout(timer.current);
    setSyncStatus("syncing");
    timer.current=setTimeout(()=>{
      dbSet({sections:s,actions:a}).then(()=>{
        setSyncStatus("saved");
        setTimeout(()=>setSyncStatus("idle"),3000);
      }).catch(()=>setSyncStatus("error"));
    },900);
  },[]);

  const setSections=v=>{setSectionsState(v);persist(v,actions);};
  const setActions =v=>{setActionsState(v); persist(sections,v);};

  const reset=()=>{
    if(!confirm("Reset all data to original defaults? This cannot be undone.")) return;
    setSectionsState(DEF_SECTIONS); setActionsState(DEF_ACTIONS);
    persist(DEF_SECTIONS,DEF_ACTIONS);
  };

  if(!loaded) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",flexDirection:"column",gap:12}}>
      <div style={{width:32,height:32,border:"3px solid var(--border-secondary)",borderTopColor:"#378ADD",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{fontSize:14,color:"var(--text-secondary)"}}>Loading shared workspace…</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.25rem",flexWrap:"wrap",gap:8}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:500,marginBottom:4}}>SE Playbook — Project Planning Tool</h1>
          <p style={{fontSize:13,color:"var(--text-secondary)"}}>Intact · Sprint review: Mar 27, 2026 · David · Steven · Stefan · Tom</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <SyncBar status={syncStatus}/>
          <button className="inline-btn" onClick={reset} style={{fontSize:11}}>Reset to defaults</button>
        </div>
      </div>
      <div className="tab-bar">
        {TABS.map((t,i)=><button key={t} className={`tab-btn ${tab===i?"active":""}`} onClick={()=>setTab(i)}>{t}</button>)}
      </div>
      {tab===0&&<Dashboard  sections={sections} actions={actions}/>}
      {tab===1&&<Kanban     sections={sections} setSections={setSections}/>}
      {tab===2&&<ProjectPlan sections={sections} setSections={setSections}/>}
      {tab===3&&<ActionItems actions={actions}  setActions={setActions}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
