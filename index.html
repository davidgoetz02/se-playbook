*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bp:#fff;--bs:#f5f5f3;--bt:#eeece6;
  --tp:#1a1a18;--ts:#6b6b67;--tt:#9b9b96;
  --bdt:rgba(0,0,0,0.12);--bds:rgba(0,0,0,0.22);--bdp:rgba(0,0,0,0.35);
  --fn:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){
  :root{--bp:#1e1e1c;--bs:#2a2a28;--bt:#333330;--tp:#f0ede6;--ts:#a0a09a;--tt:#6a6a64;--bdt:rgba(255,255,255,0.1);--bds:rgba(255,255,255,0.18);--bdp:rgba(255,255,255,0.28)}
}
body{font-family:var(--fn);background:var(--bt);color:var(--tp);min-height:100vh}
#root{max-width:1000px;margin:0 auto;padding:1.5rem 1rem}
input,textarea,select{font-family:var(--fn);background:var(--bp);color:var(--tp);border:0.5px solid var(--bdt);border-radius:var(--r);padding:5px 9px;font-size:13px;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--bds)}
button{font-family:var(--fn);cursor:pointer}
textarea{resize:vertical;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--bds);border-radius:99px}
.tab-btn{font-size:13px;padding:6px 16px;border-radius:var(--r);border:0.5px solid var(--bds);background:var(--bp);color:var(--tp);transition:all .15s}
.tab-btn.active{font-weight:500;border:1.5px solid var(--bdp);background:var(--bs)}
.card{background:var(--bp);border:0.5px solid var(--bdt);border-radius:var(--rl);padding:1rem}
.card-s{background:var(--bs);border-radius:var(--rl);padding:1rem}
.pill{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500;white-space:nowrap;display:inline-block}

.sec-hdr{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;flex-wrap:wrap}
.kb-board{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;align-items:start}
.kb-col{border-radius:10px;padding:.75rem;min-height:160px}
.kb-card{border-radius:8px;padding:.625rem .75rem;margin-bottom:8px;cursor:grab;user-select:none;border:0.5px solid var(--bdt)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.sc{background:var(--bs);border-radius:var(--r);padding:.75rem 1rem}
.owner-tags{display:flex;gap:4px;flex-wrap:wrap}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:var(--bp);border-radius:16px;padding:1.5rem;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;border:0.5px solid var(--bds)}
.modal h2{font-size:17px;font-weight:500;margin-bottom:6px}
.modal p{font-size:13px;color:var(--ts);line-height:1.6;margin-bottom:14px}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-p{font-size:13px;padding:8px 18px;border-radius:var(--r);border:none;background:#378ADD;color:#fff;font-weight:500}
.btn-p:hover{background:#2a72c4}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{font-size:13px;padding:8px 18px;border-radius:var(--r);border:0.5px solid var(--bds);background:none;color:var(--ts)}
.btn-d{font-size:12px;padding:5px 10px;border-radius:var(--r);border:0.5px solid #F09595;background:none;color:#A32D2D}
.changes-list{border:0.5px solid var(--bdt);border-radius:8px;overflow:hidden;margin-bottom:14px}
.change-item{padding:10px 14px;border-bottom:0.5px solid var(--bdt);font-size:13px;display:flex;gap:10px;align-items:flex-start}

.change-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;flex-shrink:0;margin-top:1px}
/* Login */

.login-box{background:var(--bp);border:0.5px solid var(--bds);border-radius:16px;padding:2rem;width:100%;max-width:380px}
.login-box h1{font-size:20px;font-weight:500;margin-bottom:4px}
.login-box p{font-size:13px;color:var(--ts);margin-bottom:1.5rem}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:var(--ts);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:8px 10px}
.err-msg{font-size:12px;color:#A32D2D;background:#FCEBEB;border-radius:6px;padding:6px 10px;margin-bottom:12px}
/* Admin */
.admin-section{margin-bottom:1.5rem}
.admin-section h3{font-size:14px;font-weight:500;margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid var(--bdt)}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--bdt);flex-wrap:wrap}
.user-row:last-child{border-bottom:none}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag-item{display:flex;align-items:center;gap:4px;background:var(--bs);border:0.5px solid var(--bdt);border-radius:6px;padding:3px 8px;font-size:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:32px;height:32px;border:3px solid var(--bds);border-top-color:#378ADD;border-radius:50%;animation:spin .8s linear infinite}
@media(max-width:700px){.g4{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}.kb-board{grid-template-columns:repeat(2,1fr)}}
</style>

async function sbGet(table,filter=""){
  const r=await fetch(`${SB}/rest/v1/${table}${filter?`?${filter}`:""}`,{headers:HDR});
  return r.json();
}
async function sbPatch(table,filter,body){
  await fetch(`${SB}/rest/v1/${table}?${filter}`,{method:"PATCH",headers:{...HDR,Prefer:"return=minimal"},body:JSON.stringify(body)});
}
async function sbPost(table,body){
  const r=await fetch(`${SB}/rest/v1/${table}`,{method:"POST",headers:{...HDR,Prefer:"return=representation"},body:JSON.stringify(body)});
  return r.json();
}
async function sbDelete(table,filter){
  await fetch(`${SB}/rest/v1/${table}?${filter}`,{method:"DELETE",headers:HDR});
}

async function dbGetState(){const rows=await sbGet("playbook","id=eq.state&select=data");return rows?.[0]?.data||null;}
async function dbSetState(data){await sbPatch("playbook","id=eq.state",{data,updated_at:new Date().toISOString()});}
async function dbGetUsers(){return sbGet("playbook_users","select=username,role");}
async function dbGetConfig(){return sbGet("playbook_config","select=key,value");}
async function dbSetConfig(key,value){await sbPatch("playbook_config",`key=eq.${key}`,{value,updated_at:new Date().toISOString()});}
async function dbAddUser(username,password,role){return sbPost("playbook_users",{username,password_hash:password,role});}
async function dbDeleteUser(username){return sbDelete("playbook_users",`username=eq.${username}`);}
async function dbUpdatePassword(username,pw){await sbPatch("playbook_users",`username=eq.${username}`,{password_hash:pw});}
async function dbVerifyUser(username,password){
  const rows=await sbGet("playbook_users",`username=eq.${encodeURIComponent(username)}&select=username,password_hash,role`);
  if(!rows||rows.length===0)return null;
  const u=rows[0];
  if(u.password_hash!==password)return null;
  return {username:u.username,role:u.role};
}

// ---- Login Screen ----
function LoginScreen({onLogin}){
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  async function submit(e){
    e.preventDefault();
    if(!username||!password){setErr("Please enter your name and password.");return;}
    setLoading(true);setErr("");
    const user=await dbVerifyUser(username,password);
    setLoading(false);
    if(!user){setErr("Incorrect name or password. Please try again.");return;}
    sessionStorage.setItem("sep_user",JSON.stringify(user));
    onLogin(user);
  }
  return(
    <div className="login-wrap">
      <div className="login-box">
        <h1>SE Playbook</h1>
        <p>Intact Solution Engineering · Sign in to continue</p>
        {err&&<div className="err-msg">{err}</div>}
        <form onSubmit={submit}>
          <div className="form-group">
            <label>Your name</label>
            <input value={username} onChange={e=>setUsername(e.target.value)} placeholder="e.g. David" autoFocus/>
          </div>
          <div className="form-group">
            <label>Password</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Enter your password"/>
          </div>
          <button type="submit" className="btn-p" style={{width:"100%",marginTop:8}} disabled={loading}>
            {loading?"Signing in…":"Sign in →"}
          </button>
        </form>
      </div>
    </div>
  );
}

  const [localCfg,setLocalCfg]=useState(cfg);
  const [addStatus,setAddStatus]=useState("");
  const [addPrio,setAddPrio]=useState("");
  const [addOwner,setAddOwner]=useState("");
  const [addActionStatus,setAddActionStatus]=useState("");

  useEffect(()=>{
    dbGetUsers().then(u=>{setUsers(u||[]);setLoadingUsers(false);});
  },[]);

  function flash(m){setMsg(m);setTimeout(()=>setMsg(""),3000);}

  async function addUser(){
    if(!newUser.username||!newUser.password){flash("Please fill in name and password.");return;}
    await dbAddUser(newUser.username,newUser.password,newUser.role);
    const u=await dbGetUsers();setUsers(u||[]);
    setNewUser({username:"",password:"",role:"member"});
    flash(`User "${newUser.username}" added.`);
  }
  async function deleteUser(username){
    if(!confirm(`Remove user "${username}"? They will no longer be able to log in.`))return;
    await dbDeleteUser(username);
    const u=await dbGetUsers();setUsers(u||[]);
    flash(`User "${username}" removed.`);
  }
  async function updatePw(username){
    const pw=newPw[username];if(!pw){return;}
    await dbUpdatePassword(username,pw);
    setNewPw(p=>({...p,[username]:""}));
    flash(`Password updated for "${username}".`);
  }

  async function saveCfg(){
    await Promise.all([
      dbSetConfig("statuses",localCfg.statuses),
      dbSetConfig("priorities",localCfg.priorities),
      dbSetConfig("owners",localCfg.owners),
      dbSetConfig("action_statuses",localCfg.action_statuses),
    ]);
    setCfg(localCfg);onCfgSave(localCfg);
    flash("Configuration saved and applied.");
  }

  function addToList(key,val,setVal){
    if(!val.trim())return;
    setLocalCfg(c=>({...c,[key]:[...c[key],val.trim()]}));
    setVal("");
  }
  function removeFromList(key,idx){setLocalCfg(c=>({...c,[key]:c[key].filter((_,i)=>i!==idx)}));}

  return(
    <div>
      <div style={{background:"#FAEEDA",border:"1px solid #EF9F27",borderRadius:8,padding:"8px 12px",marginBottom:"1.25rem",fontSize:12,color:"#633806"}}>
        🔒 Admin panel — visible only to you. Changes to users and configuration apply immediately for all team members.
      </div>
      {msg&&<div style={{background:"#EAF3DE",border:"1px solid #97C459",borderRadius:8,padding:"8px 12px",marginBottom:"1rem",fontSize:12,color:"#3B6D11"}}>✓ {msg}</div>}

      {/* Users */}
      <div className="admin-section">
        <h3>Team members</h3>
        {loadingUsers?<Spinner size={24}/>:(
          <div>
            {users.map(u=>(
              <div key={u.username} className="user-row">
                <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:120}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:ownerColor(u.username,users.map(x=>x.username))+"22",border:`1.5px solid ${ownerColor(u.username,users.map(x=>x.username))}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:600,color:ownerColor(u.username,users.map(x=>x.username))}}>{u.username[0]}</div>
                  <span style={{fontSize:13,fontWeight:500}}>{u.username}</span>
                  <span className="pill" style={{fontSize:10,background:u.role==="admin"?"#FAEEDA":"#F1EFE8",color:u.role==="admin"?"#633806":"#5F5E5A"}}>{u.role}</span>
                </div>
                <input type="password" value={newPw[u.username]||""} onChange={e=>setNewPw(p=>({...p,[u.username]:e.target.value}))} placeholder="New password" style={{width:140,fontSize:12}}/>
                <button className="btn-p" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>updatePw(u.username)}>Update</button>
                {u.role!=="admin"&&<button className="btn-d" onClick={()=>deleteUser(u.username)}>Remove</button>}
              </div>
            ))}
          </div>
        )}
        <div style={{marginTop:14,padding:"12px",background:"var(--bs)",borderRadius:8}}>
          <div style={{fontSize:12,fontWeight:500,marginBottom:8}}>Add new user</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <input value={newUser.username} onChange={e=>setNewUser(p=>({...p,username:e.target.value}))} placeholder="Name" style={{flex:1,minWidth:100,fontSize:12}}/>
            <input type="password" value={newUser.password} onChange={e=>setNewUser(p=>({...p,password:e.target.value}))} placeholder="Password" style={{flex:1,minWidth:100,fontSize:12}}/>
            <Sel value={newUser.role} options={["member","admin"]} onChange={v=>setNewUser(p=>({...p,role:v}))} small/>
            <button className="btn-p" style={{fontSize:12,padding:"5px 14px"}} onClick={addUser}>Add user</button>
          </div>
        </div>
      </div>

      {/* Config */}
      <div className="admin-section">
        <h3>Configuration</h3>
        {[
          {key:"statuses",label:"Section statuses",addVal:addStatus,setAdd:setAddStatus},
          {key:"priorities",label:"Priority levels",addVal:addPrio,setAdd:setAddPrio},
          {key:"owners",label:"Owner dropdown options",addVal:addOwner,setAdd:setAddOwner},
          {key:"action_statuses",label:"Action item statuses",addVal:addActionStatus,setAdd:setAddActionStatus},
        ].map(({key,label,addVal,setAdd})=>(
          <div key={key} style={{marginBottom:16}}>
            <div style={{fontSize:12,color:"var(--ts)",marginBottom:6}}>{label}</div>
            <div className="tag-row" style={{marginBottom:6}}>
              {localCfg[key].map((v,i)=>(
                <div key={i} className="tag-item">
                  <span>{v}</span>
                  <button onClick={()=>removeFromList(key,i)} style={{background:"none",border:"none",color:"#A32D2D",fontSize:14,lineHeight:1,padding:0}}>×</button>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:6}}>
              <input value={addVal} onChange={e=>setAdd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addToList(key,addVal,setAdd)} placeholder={`Add ${label.toLowerCase()}…`} style={{fontSize:12,flex:1}}/>
              <button className="btn-s" style={{fontSize:12,padding:"4px 10px"}} onClick={()=>addToList(key,addVal,setAdd)}>Add</button>
            </div>
          </div>
        ))}
        <button className="btn-p" onClick={saveCfg} style={{marginTop:4}}>Save configuration</button>
      </div>
    </div>
  );
}

// ---- Sprint Import Modal ----
const AI_SYS=`You are a project management assistant for the Intact SE Playbook initiative.
You will receive the current state of a project planning tool (sections and action items) and a sprint review transcript.
Analyse the transcript carefully and return ONLY a valid JSON object with this exact structure — no markdown, no explanation:
{"summary":"2-3 sentence plain English summary of what changed this sprint","sectionUpdates":[{"num":"<section number, use string for 11–13>","changes":{"status":"<new status if changed, else omit>","flag":"<new flag text if changed, empty string to clear, else omit>","notes":"<appended note if new context emerged, else omit>","tasksToAdd":[{"task":"<text>","status":"Not Started"}],"tasksToComplete":["<exact task text to mark Done>"],"tasksToUpdate":[{"task":"<exact existing task text>","newStatus":"<status>"}]}}],"actionsToComplete":[<id numbers of actions mentioned as done>],"actionsToAdd":[{"owner":"<name>","action":"<text>","due":"<date>","dep":"<dependency or empty>","status":"Committed","type":"action"}],"questionsToResolve":[<id numbers of questions that were answered>],"questionsToAdd":[{"owner":"<name>","action":"<question text>","due":"TBD","dep":"","status":"Decision Needed","type":"question"}]}
Rules: only include fields that actually changed; only mark things Done if explicitly stated as completed; be conservative; return ONLY the JSON.`;

function SprintModal({sections,actions,owners,onApply,onClose}){
  const [text,setText]=useState("");
  const [stage,setStage]=useState("input");
  const [diff,setDiff]=useState(null);
  const [err,setErr]=useState("");

  async function analyse(){
    if(!text.trim()){setErr("Please paste the transcript first.");return;}
    setErr("");setStage("thinking");
    const state=JSON.stringify({sections:sections.map(s=>({num:s.num,title:s.title,owner:s.owner,status:s.status,flag:s.flag,tasks:s.tasks})),actions});
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system:AI_SYS,messages:[{role:"user",content:`CURRENT STATE:\n${state}\n\nSPRINT TRANSCRIPT:\n${text}`}]})});
      const data=await res.json();
      const raw=data.content?.[0]?.text||"";
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setDiff(parsed);setStage("review");
    }catch(e){setErr("Failed to analyse transcript. Please try again.");setStage("input");}
  }

  function apply(){
    setStage("applying");
    let ns=[...sections],na=[...actions];
    (diff.sectionUpdates||[]).forEach(u=>{
      const idx=ns.findIndex(s=>String(s.num)===String(u.num));if(idx===-1)return;
      const s={...ns[idx]},c=u.changes||{};
      if(c.status!==undefined)s.status=c.status;
      if(c.flag!==undefined)s.flag=c.flag;
      if(c.notes!==undefined)s.notes=s.notes+(s.notes?"\n\n":"")+c.notes;
      if(c.tasksToAdd?.length)s.tasks=[...s.tasks,...c.tasksToAdd];
      if(c.tasksToComplete?.length)s.tasks=s.tasks.map(t=>c.tasksToComplete.includes(t.task)?{...t,status:"Done"}:t);
      if(c.tasksToUpdate?.length)s.tasks=s.tasks.map(t=>{const u2=c.tasksToUpdate.find(x=>x.task===t.task);return u2?{...t,status:u2.newStatus}:t;});
      ns[idx]=s;
    });
    (diff.actionsToComplete||[]).forEach(id=>{na=na.map(a=>a.id===id?{...a,status:"Done"}:a);});
    const mid=Math.max(0,...na.map(a=>a.id));
    (diff.actionsToAdd||[]).forEach((a,i)=>na.push({...a,id:mid+i+1}));
    (diff.questionsToResolve||[]).forEach(id=>{na=na.map(a=>a.id===id?{...a,status:"Done"}:a);});
    const mid2=Math.max(0,...na.map(a=>a.id));
    (diff.questionsToAdd||[]).forEach((q,i)=>na.push({...q,id:mid2+i+1}));
    onApply(ns,na);onClose();
  }

  const cc=(diff?.sectionUpdates||[]).reduce((s,u)=>{const c=u.changes||{};return s+(c.status?1:0)+(c.flag!==undefined?1:0)+(c.notes?1:0)+(c.tasksToAdd?.length||0)+(c.tasksToComplete?.length||0)+(c.tasksToUpdate?.length||0);},(diff?.actionsToComplete?.length||0)+(diff?.actionsToAdd?.length||0)+(diff?.questionsToResolve?.length||0)+(diff?.questionsToAdd?.length||0));

  return(
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
          <h2>📋 Update from sprint review</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:"var(--tt)",lineHeight:1}}>×</button>
        </div>
        {stage==="input"&&<>
          <p>Paste your sprint review transcript below. Claude will analyse it and show you a preview of all proposed changes before applying them.</p>
          <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Paste transcript here…" style={{width:"100%",height:200,marginBottom:10,fontSize:12,padding:"8px 10px",borderRadius:8,border:"0.5px solid var(--bds)"}}/>
          {err&&<div style={{color:"#A32D2D",fontSize:12,marginBottom:10}}>⚠ {err}</div>}
          <div className="btn-row"><button className="btn-s" onClick={onClose}>Cancel</button><button className="btn-p" onClick={analyse} disabled={!text.trim()}>Analyse →</button></div>
        </>}
        {stage==="thinking"&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,padding:"2rem 0"}}><Spinner/><div style={{fontSize:13,color:"var(--ts)"}}>Analysing transcript…</div></div>}
        {stage==="review"&&diff&&<>
          <p style={{marginBottom:8}}><strong>Summary:</strong> {diff.summary}</p>
          <p style={{marginBottom:10,color:"var(--ts)"}}>Found <strong>{cc}</strong> change{cc!==1?"s":""} to apply. Review below then confirm.</p>
          <div className="changes-list">
            {(diff.sectionUpdates||[]).flatMap((u,i)=>{
              const s=sections.find(x=>String(x.num)===String(u.num));const c=u.changes||{};const items=[];
              if(c.status)items.push(`Status → ${c.status}`);
              if(c.flag!==undefined)items.push(c.flag?`Flag: ${c.flag}`:"Flag cleared");
              if(c.notes)items.push("Notes updated");
              (c.tasksToAdd||[]).forEach(t=>items.push(`New task: ${t.task}`));
              (c.tasksToComplete||[]).forEach(t=>items.push(`Completed: ${t}`));
              (c.tasksToUpdate||[]).forEach(t=>items.push(`${t.task} → ${t.newStatus}`));
              return items.map((item,j)=><div key={`s${i}${j}`} className="change-item"><span className="change-tag" style={{background:"#E6F1FB",color:"#185FA5"}}>§{u.num}</span><span>{s?.title} — {item}</span></div>);
            })}
            {(diff.actionsToComplete||[]).map(id=>{const a=actions.find(x=>x.id===id);return <div key={`ac${id}`} className="change-item"><span className="change-tag" style={{background:"#EAF3DE",color:"#3B6D11"}}>Done</span><span>{a?.action||`Action #${id}`}</span></div>;})}
            {(diff.actionsToAdd||[]).map((a,i)=><div key={`aa${i}`} className="change-item"><span className="change-tag" style={{background:"#FAEEDA",color:"#633806"}}>New</span><span>{a.owner} — {a.action} (due: {a.due})</span></div>)}
            {(diff.questionsToResolve||[]).map(id=>{const q=actions.find(x=>x.id===id);return <div key={`qr${id}`} className="change-item"><span className="change-tag" style={{background:"#EAF3DE",color:"#3B6D11"}}>Resolved</span><span>{q?.action||`Q #${id}`}</span></div>;})}
            {(diff.questionsToAdd||[]).map((q,i)=><div key={`qa${i}`} className="change-item"><span className="change-tag" style={{background:"#EEEDFE",color:"#3C3489"}}>New Q</span><span>{q.action}</span></div>)}
            {cc===0&&<div className="change-item"><span style={{color:"var(--ts)",fontSize:13}}>No changes detected in this transcript.</span></div>}
          </div>
          <div className="btn-row"><button className="btn-s" onClick={()=>{setStage("input");setDiff(null);}}>← Re-paste</button><button className="btn-s" onClick={onClose}>Cancel</button><button className="btn-p" onClick={apply} disabled={cc===0}>Apply {cc} change{cc!==1?"s":""}</button></div>
        </>}
        {stage==="applying"&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,padding:"2rem 0"}}><Spinner/><div style={{fontSize:13,color:"var(--ts)"}}>Applying and syncing…</div></div>}
      </div>
    </div>
  );
}

// ---- Dashboard ----
function Dashboard({sections,actions,cfg}){
  const {owners}=cfg;
  const total=sections.length,done=sections.filter(s=>s.status==="Done").length;
  const actv=sections.filter(s=>["In Progress","In Cleanup","Collecting"].includes(s.status)).length;
  const blkd=sections.filter(s=>s.status==="Blocked").length,ns=sections.filter(s=>s.status==="Not Started").length;
  const pct=Math.round((done/total)*100);
  const allT=sections.flatMap(s=>s.tasks.map(t=>({...t,section:s.title,sn:s.num,prio:s.prio})));
  const actT=allT.filter(t=>["In Progress","In Cleanup"].includes(t.status));
  const openA=actions.filter(a=>a.type==="action"&&a.status!=="Done");
  const openQ=actions.filter(a=>a.type==="question"&&a.status!=="Done");
  const flags=sections.filter(s=>s.flag);
  const bc=pct>=70?"#1D9E75":pct>=40?"#378ADD":"#BA7517";
  const om={};
  sections.forEach(s=>s.owner.split("+").map(o=>o.trim()).forEach(o=>{if(!om[o])om[o]={total:0,done:0,actv:0};om[o].total++;if(s.status==="Done")om[o].done++;if(["In Progress","In Cleanup","Collecting"].includes(s.status))om[o].actv++;}));
  return(
    <div>
      <div className="card-s" style={{marginBottom:"1rem",padding:"1.25rem 1.5rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:10,flexWrap:"wrap",gap:8}}>
          <div><div style={{fontSize:13,color:"var(--ts)",marginBottom:2}}>Overall playbook completion</div><div style={{fontSize:32,fontWeight:500}}>{pct}%</div></div>
          <div style={{fontSize:12,color:"var(--ts)"}}>{done} of {total} sections complete</div>
        </div>
        <div style={{height:10,background:"var(--bp)",borderRadius:99,overflow:"hidden",border:"0.5px solid var(--bdt)"}}>
          <div style={{height:"100%",width:`${pct}%`,background:bc,borderRadius:99}}/>
        </div>
        <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
          {[["Done",done,"#EAF3DE","#3B6D11"],["Active",actv,"#E6F1FB","#185FA5"],["Not Started",ns,"#F1EFE8","#5F5E5A"],["Blocked",blkd,"#FCEBEB","#A32D2D"]].map(([l,v,bg,c])=>(
            <span key={l} className="pill" style={{fontSize:11,padding:"3px 10px",background:bg,color:c}}>{l}: {v}</span>
          ))}
        </div>
      </div>
      <div className="g4"><SC label="Total tasks" val={allT.length}/><SC label="Active tasks" val={actT.length} color="#185FA5"/><SC label="Open actions" val={openA.length} color="#633806"/><SC label="Open questions" val={openQ.length} color="#3C3489"/></div>
      <div className="two-col">
        <div className="card">
          <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Active tasks</div>
          {actT.length===0&&<div style={{fontSize:12,color:"var(--tt)"}}>No active tasks.</div>}
          {actT.map((t,i)=>(
            <div key={i} style={{borderBottom:"0.5px solid var(--bdt)",paddingBottom:8,marginBottom:8}}>
              <div style={{display:"flex",gap:6,marginBottom:3,flexWrap:"wrap"}}><SPill status={t.status} small/><Pill label={t.prio} bg={PS_FIXED[t.prio]?.bg} text={PS_FIXED[t.prio]?.text}/></div>
              <div style={{fontSize:12,lineHeight:1.4,marginBottom:2}}>{t.task}</div>
              <div style={{fontSize:11,color:"var(--tt)"}}>§{t.sn} {t.section}</div>
            </div>
          ))}
        </div>
        <div className="card">
          <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Open actions</div>
          {openA.length===0&&<div style={{fontSize:12,color:"var(--tt)"}}>All actions complete!</div>}
          {openA.slice(0,7).map((a,i)=>(
            <div key={i} style={{borderBottom:"0.5px solid var(--bdt)",paddingBottom:8,marginBottom:8}}>
              <div style={{display:"flex",gap:6,marginBottom:3,flexWrap:"wrap"}}><span className="pill" style={{fontSize:11,background:(ASC_FIXED[a.status]||"#888")+"22",color:ASC_FIXED[a.status]||"#888"}}>{a.status}</span><span style={{fontSize:11,color:"var(--tt)"}}>{a.due}</span></div>
              <div style={{fontSize:12,lineHeight:1.4,marginBottom:4}}>{a.action}</div>
              <OTag owner={a.owner} owners={owners}/>
            </div>
          ))}
          {openA.length>7&&<div style={{fontSize:11,color:"var(--ts)"}}>+{openA.length-7} more in Action Items tab</div>}
        </div>
      </div>
      <div className="card" style={{marginBottom:"1rem"}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Owner workload</div>
        <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(owners.length,4)},1fr)`,gap:10}}>
          {owners.map(name=>{
            const d=om[name]||{total:0,done:0,actv:0};
            const p=d.total>0?Math.round((d.done/d.total)*100):0;
            const c=ownerColor(name,owners);
            const myA=actions.filter(a=>a.owner.includes(name)&&a.type==="action"&&a.status!=="Done");
            return(
              <div key={name} className="card-s" style={{padding:".75rem"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:c+"22",border:`1.5px solid ${c}66`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:c}}>{name[0]}</div>
                  <span style={{fontSize:13,fontWeight:500}}>{name}</span>
                </div>
                <div style={{fontSize:11,color:"var(--ts)",marginBottom:6}}>{d.total} sections · {d.actv} active · {myA.length} actions</div>
                <div style={{height:5,background:"var(--bp)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${p}%`,background:c,borderRadius:99}}/></div>
                <div style={{fontSize:11,color:"var(--tt)",marginTop:3}}>{p}% complete</div>
              </div>
            );
          })}
        </div>
      </div>
      {flags.length>0&&<div className="card"><div style={{fontSize:13,fontWeight:500,marginBottom:8}}>Active flags & blockers</div>{flags.map((s,i)=><FlagB key={i} text={`§${s.num} ${s.title}: ${s.flag}`}/>)}</div>}
    </div>
  );
}

// ---- Kanban ----
function Kanban({sections,setSections,cfg}){
  const {statuses,owners}=cfg;
  const di=useRef(null);
  const cols=["Not Started","In Progress","In Cleanup","Done","Blocked"];
  const onDS=(e,i)=>{di.current=i;e.dataTransfer.effectAllowed="move";};
  const onDrop=(e,col)=>{e.preventDefault();if(di.current===null)return;const n=[...sections];n[di.current]={...n[di.current],status:col};setSections(n);di.current=null;};
  const onDO=e=>e.preventDefault();
  return(
    <div>
      <div style={{fontSize:12,color:"var(--ts)",marginBottom:12}}>Drag cards between columns or use the dropdown. Changes sync automatically.</div>
      <div className="kb-board">
        {cols.map(col=>{
          const cs=SS_FIXED[col]||{bg:"#F1EFE8",text:"#5F5E5A",border:"#B4B2A9"};
          const colS=sections.filter(s=>s.status===col);
          return(
            <div key={col} className="kb-col" style={{background:"var(--bs)"}} onDragOver={onDO} onDrop={e=>onDrop(e,col)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:12,fontWeight:500,color:cs.text}}>{col}</span>
                <span className="pill" style={{fontSize:11,background:cs.bg,color:cs.text,border:`1px solid ${cs.border}`}}>{colS.length}</span>
              </div>
              {colS.map(s=>{
                const gi=sections.findIndex(x=>x.num===s.num);
                const td=s.tasks.filter(t=>t.status==="Done").length,tp=s.tasks.length>0?Math.round((td/s.tasks.length)*100):0;
                const oc=ownerColor(s.owner.split(/[+ ]/)[0],owners);
                return(
                  <div key={String(s.num)} className="kb-card" style={{background:"var(--bp)"}} draggable onDragStart={e=>onDS(e,gi)}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5,gap:4}}>
                      <span style={{fontSize:11,fontWeight:500,lineHeight:1.3}}>§{s.num} {s.title}</span>
                      <Pill label={s.prio} bg={PS_FIXED[s.prio]?.bg} text={PS_FIXED[s.prio]?.text}/>
                    </div>
                    <OTag owner={s.owner} owners={owners}/>
                    {s.flag&&<div style={{fontSize:10,color:"#A32D2D",background:"#FCEBEB",borderRadius:4,padding:"2px 6px",marginTop:5}}>⚑ Flagged</div>}
                    <div style={{marginTop:6,fontSize:10,color:"var(--tt)",marginBottom:3}}>{td}/{s.tasks.length} tasks done</div>
                    <div style={{height:3,background:"var(--bs)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${tp}%`,background:oc,borderRadius:99}}/></div>
                    <div style={{marginTop:6}}><Sel value={s.status} options={statuses} onChange={v=>{const n=[...sections];n[gi]={...n[gi],status:v};setSections(n);}} small/></div>
                  </div>
                );
              })}
              {colS.length===0&&<div style={{fontSize:11,color:"var(--tt)",textAlign:"center",padding:"1rem 0",opacity:.4}}>Drop here</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ---- Project Plan ----
function ProjectPlan({sections,setSections,cfg}){
  const {statuses,priorities,owners}=cfg;
  const [open,setOpen]=useState(null);
  const upd=(i,f,v)=>{const n=[...sections];n[i]={...n[i],[f]:v};setSections(n);};
  const updT=(si,ti,f,v)=>{const n=[...sections];const t=[...n[si].tasks];t[ti]={...t[ti],[f]:v};n[si]={...n[si],tasks:t};setSections(n);};
  const addT=si=>{const n=[...sections];n[si].tasks=[...n[si].tasks,{task:"New task",status:"Not Started"}];setSections(n);};
  const rmT=(si,ti)=>{const n=[...sections];n[si].tasks=n[si].tasks.filter((_,j)=>j!==ti);setSections(n);};
  const ownerOpts=[...owners,...owners.flatMap((a,i)=>owners.slice(i+1).map(b=>`${a} + ${b}`)),"All"];
  return(
    <div>
      <div className="g4"><SC label="Sections" val={sections.length}/><SC label="Prio 1" val={sections.filter(s=>s.prio==="P1").length} color="#A32D2D"/><SC label="Active" val={sections.filter(s=>["In Progress","In Cleanup","Collecting"].includes(s.status)).length} color="#185FA5"/><SC label="Done" val={sections.filter(s=>s.status==="Done").length} color="#3B6D11"/></div>
      {sections.map((s,si)=>(
        <div key={si} className="sec-row">
          <div className="sec-hdr">
            <span style={{fontSize:12,color:"var(--tt)",minWidth:20}}>{s.num}</span>
            <span style={{fontSize:13,fontWeight:500,flex:1}}>{s.title}</span>
            <OTag owner={s.owner} owners={owners}/>
            <Sel value={s.prio} options={priorities} onChange={v=>upd(si,"prio",v)} small/>
            <Sel value={s.status} options={statuses} onChange={v=>upd(si,"status",v)} small/>
            <button onClick={()=>setOpen(open===si?null:si)} style={{fontSize:12,background:"none",border:"none",color:"var(--tt)",padding:0}}>{open===si?"▲":"▼"}</button>
          </div>
          {open===si&&(
            <div style={{padding:"0 1rem 1rem",borderTop:"0.5px solid var(--bdt)"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10,marginBottom:10}}>
                <div><div style={{fontSize:11,color:"var(--ts)",marginBottom:4}}>Owner</div><Sel value={s.owner} options={ownerOpts} onChange={v=>upd(si,"owner",v)}/></div>
                <div><div style={{fontSize:11,color:"var(--ts)",marginBottom:4}}>Flag / blocker</div><Txt value={s.flag} onChange={v=>upd(si,"flag",v)}/></div>
              </div>
              {s.flag&&<FlagB text={s.flag}/>}
              <div style={{fontSize:11,color:"var(--ts)",marginBottom:6}}>Tasks</div>
              {s.tasks.map((t,ti)=>(
                <div key={ti} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <Sel value={t.status} options={statuses} onChange={v=>updT(si,ti,"status",v)} small/>
                  <Txt value={t.task} onChange={v=>updT(si,ti,"task",v)} style={{fontSize:12}}/>
                  <button onClick={()=>rmT(si,ti)} style={{fontSize:14,color:"#A32D2D",background:"none",border:"none",padding:"0 4px",flexShrink:0}}>×</button>
                </div>
              ))}
              <button style={{fontSize:12,padding:"4px 12px",borderRadius:6,border:"0.5px solid var(--bds)",background:"var(--bs)",color:"var(--ts)",marginTop:4}} onClick={()=>addT(si)}>+ Add task</button>
              <div style={{marginTop:10}}><div style={{fontSize:11,color:"var(--ts)",marginBottom:4}}>Notes</div><Txt value={s.notes} onChange={v=>upd(si,"notes",v)} multi/></div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ---- Action Items ----
function ActionItems({actions,setActions,cfg}){
  const {owners,action_statuses}=cfg;
  const [editId,setEditId]=useState(null);
  const [view,setView]=useState("action");
  const upd=(id,f,v)=>setActions(prev=>prev.map(a=>a.id===id?{...a,[f]:v}:a));
  const add=type=>{const id=Math.max(0,...actions.map(a=>a.id))+1;setActions([...actions,{id,owner:owners[0]||"David",action:type==="question"?"New open question":"New action item",due:"TBD",dep:"",status:type==="question"?"Decision Needed":"Committed",type}]);};
  const rm=id=>setActions(prev=>prev.filter(a=>a.id!==id));
  const filtered=actions.filter(a=>a.type===view);
  const ac=actions.filter(a=>a.type==="action"),qc=actions.filter(a=>a.type==="question");
  const ownerOpts=[...owners,...owners.flatMap((a,i)=>owners.slice(i+1).map(b=>`${a} + ${b}`)),"All"];
  return(
    <div>
      <div style={{display:"flex",gap:4,marginBottom:"1.25rem"}}>
        {[["action","Action Items"],["question","Open Questions"]].map(([v,l])=>(
          <button key={v} className={`tab-btn ${view===v?"active":""}`} onClick={()=>setView(v)}>{l}</button>
        ))}
      </div>
      {view==="action"&&<div className="g4"><SC label="Total" val={ac.length}/><SC label="Urgent" val={ac.filter(a=>a.status==="Urgent").length} color="#A32D2D"/><SC label="Decision needed" val={ac.filter(a=>a.status==="Decision Needed").length} color="#633806"/><SC label="Done" val={ac.filter(a=>a.status==="Done").length} color="#3B6D11"/></div>}
      {view==="question"&&<div className="g3"><SC label="Total" val={qc.length}/><SC label="Open" val={qc.filter(a=>a.status!=="Done").length} color="#3C3489"/><SC label="Resolved" val={qc.filter(a=>a.status==="Done").length} color="#3B6D11"/></div>}
      {filtered.map(a=>(
        <div key={a.id} style={{background:"var(--bp)",border:`0.5px solid ${a.status==="Urgent"?"#F09595":a.status==="Done"?"#97C459":a.type==="question"?"#AFA9EC":"var(--bdt)"}`,borderRadius:8,padding:".75rem 1rem",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                {a.type==="question"&&<span className="pill" style={{fontSize:11,background:"#EEEDFE",color:"#3C3489"}}>?</span>}
                <Sel value={a.status} options={a.type==="question"?["Decision Needed","In Progress","Done"]:action_statuses} onChange={v=>upd(a.id,"status",v)} small/>
                {editId===a.id?<Sel value={a.owner} options={ownerOpts} onChange={v=>upd(a.id,"owner",v)} small/>:<OTag owner={a.owner} owners={owners}/>}
                {editId===a.id?<Txt value={a.due} onChange={v=>upd(a.id,"due",v)} style={{fontSize:11,width:100}}/>:<span style={{fontSize:11,color:"var(--tt)"}}>Due: {a.due}</span>}
              </div>
              {editId===a.id?<Txt value={a.action} onChange={v=>upd(a.id,"action",v)} multi/>:<div style={{fontSize:13,color:a.status==="Done"?"var(--ts)":"var(--tp)",textDecoration:a.status==="Done"?"line-through":"none",lineHeight:1.5}}>{a.action}</div>}
              {editId===a.id&&a.type==="action"&&<div style={{marginTop:6}}><div style={{fontSize:11,color:"var(--ts)",marginBottom:3}}>Dependency</div><Txt value={a.dep} onChange={v=>upd(a.id,"dep",v)} style={{fontSize:12}}/></div>}
              {a.dep&&editId!==a.id&&<div style={{fontSize:11,color:"#633806",background:"#FAEEDA",borderRadius:4,padding:"3px 8px",marginTop:6,display:"inline-block"}}>◆ {a.dep}</div>}
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}}>
              <button style={{fontSize:11,padding:"3px 8px",borderRadius:6,border:"0.5px solid var(--bds)",background:"none",color:"var(--ts)"}} onClick={()=>setEditId(editId===a.id?null:a.id)}>{editId===a.id?"Done":"Edit"}</button>
              <button style={{fontSize:11,padding:"3px 8px",borderRadius:6,border:"0.5px solid #F09595",background:"none",color:"#A32D2D"}} onClick={()=>rm(a.id)}>×</button>
            </div>
          </div>
        </div>
      ))}
      <button style={{fontSize:13,padding:"7px 16px",borderRadius:8,border:"0.5px solid var(--bds)",background:"var(--bs)",color:"var(--tp)",marginTop:4}} onClick={()=>add(view)}>+ Add {view==="question"?"open question":"action item"}</button>
    </div>
  );
}

// ---- Root ----
function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState(0);
  const [sections,setSS]=useState(DEF_S);
  const [actions,setAS]=useState(DEF_A);
  const [cfg,setCfg]=useState(DEF_CFG);
  const [loaded,setLoaded]=useState(false);
  const [sync,setSync]=useState("idle");
  const [showImport,setShowImport]=useState(false);
  const timer=useRef(null);
  const isAdmin=user?.role==="admin";
  const TABS=["Dashboard","Kanban","Project Plan","Action Items",...(isAdmin?["⚙ Admin"]:[""])].filter(Boolean);

  useEffect(()=>{
    const stored=sessionStorage.getItem("sep_user");
    if(stored){try{setUser(JSON.parse(stored));}catch(e){}}
  },[]);

  useEffect(()=>{
    if(!user)return;
    Promise.all([dbGetState(),dbGetConfig()]).then(([state,cfgRows])=>{
      if(state?.sections)setSS(state.sections);
      if(state?.actions)setAS(state.actions);
      if(cfgRows&&cfgRows.length){
        const c={...DEF_CFG};
        cfgRows.forEach(r=>{if(c[r.key]!==undefined)c[r.key]=r.value;});
        setCfg(c);
      }
      setLoaded(true);
    }).catch(()=>setLoaded(true));
  },[user]);

  const persist=useCallback((s,a)=>{
    if(timer.current)clearTimeout(timer.current);
    setSync("syncing");
    timer.current=setTimeout(()=>{
      dbSetState({sections:s,actions:a}).then(()=>{setSync("saved");setTimeout(()=>setSync("idle"),3000);}).catch(()=>setSync("error"));
    },900);
  },[]);

  const setSections=v=>{setSS(v);persist(v,actions);};
  const setActions=v=>{setAS(v);persist(sections,v);};
  const applyImport=(ns,na)=>{setSS(ns);setAS(na);persist(ns,na);};

  function logout(){sessionStorage.removeItem("sep_user");setUser(null);setLoaded(false);}

  if(!user)return <LoginScreen onLogin={u=>{setUser(u);}}/>;
  if(!loaded)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
      <Spinner/><div style={{fontSize:14,color:"var(--ts)"}}>Loading workspace…</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  const tabIdx=Math.min(tab,TABS.length-1);

  return(
    <div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      {showImport&&<SprintModal sections={sections} actions={actions} owners={cfg.owners} onApply={applyImport} onClose={()=>setShowImport(false)}/>}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.25rem",flexWrap:"wrap",gap:8}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:500,marginBottom:4}}>SE Playbook — Project Planning Tool</h1>
          <p style={{fontSize:13,color:"var(--ts)"}}>Intact · Shared workspace</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <SyncDot s={sync}/>
          {isAdmin&&<button onClick={()=>setShowImport(true)} style={{fontSize:13,padding:"7px 14px",borderRadius:8,border:"none",background:"#378ADD",color:"#fff",fontWeight:500}}>📋 Update from sprint</button>}
          <div style={{display:"flex",alignItems:"center",gap:6,background:"var(--bs)",borderRadius:8,padding:"5px 10px"}}>
            <div style={{width:22,height:22,borderRadius:"50%",background:ownerColor(user.username,cfg.owners)+"22",border:`1.5px solid ${ownerColor(user.username,cfg.owners)}66`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:ownerColor(user.username,cfg.owners)}}>{user.username[0]}</div>
            <span style={{fontSize:12,fontWeight:500}}>{user.username}</span>
            <button onClick={logout} style={{fontSize:11,background:"none",border:"none",color:"var(--tt)",padding:"0 0 0 4px"}}>Sign out</button>
          </div>
        </div>
      </div>

      <div style={{display:"flex",gap:4,marginBottom:"1.25rem",flexWrap:"wrap"}}>
        {TABS.map((t,i)=><button key={t} className={`tab-btn ${tabIdx===i?"active":""}`} onClick={()=>setTab(i)}>{t}</button>)}
      </div>

      {tabIdx===0&&<Dashboard sections={sections} actions={actions} cfg={cfg}/>}
      {tabIdx===1&&<Kanban sections={sections} setSections={setSections} cfg={cfg}/>}
      {tabIdx===2&&<ProjectPlan sections={sections} setSections={setSections} cfg={cfg}/>}
      {tabIdx===3&&<ActionItems actions={actions} setActions={setActions} cfg={cfg}/>}
      {tabIdx===4&&isAdmin&&<AdminPanel cfg={cfg} setCfg={setCfg} onCfgSave={newCfg=>setCfg(newCfg)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
