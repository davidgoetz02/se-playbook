<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#ffffff;--bg-secondary:#f5f5f3;--bg-tertiary:#eeece6;
  --text-primary:#1a1a18;--text-secondary:#6b6b67;--text-tertiary:#9b9b96;
  --border-t:rgba(0,0,0,0.12);--border-s:rgba(0,0,0,0.22);--border-p:rgba(0,0,0,0.35);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg-primary:#1e1e1c;--bg-secondary:#2a2a28;--bg-tertiary:#333330;--text-primary:#f0ede6;--text-secondary:#a0a09a;--text-tertiary:#6a6a64;--border-t:rgba(255,255,255,0.1);--border-s:rgba(255,255,255,0.18);--border-p:rgba(255,255,255,0.28)}
}
body{font-family:var(--font);background:var(--bg-tertiary);color:var(--text-primary);min-height:100vh}
#root{max-width:1000px;margin:0 auto;padding:1.5rem 1rem}
input,textarea,select{font-family:var(--font);background:var(--bg-primary);color:var(--text-primary);border:0.5px solid var(--border-t);border-radius:8px;padding:5px 9px;font-size:13px;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--border-s)}
button{font-family:var(--font);cursor:pointer}
textarea{resize:vertical;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:99px}
.tab-btn{font-size:13px;padding:6px 16px;border-radius:8px;border:0.5px solid var(--border-s);background:var(--bg-primary);color:var(--text-primary);transition:all .15s}
.tab-btn.active{font-weight:500;border:1.5px solid var(--border-p);background:var(--bg-secondary)}
.card{background:var(--bg-primary);border:0.5px solid var(--border-t);border-radius:12px;padding:1rem}
.card-sec{background:var(--bg-secondary);border-radius:12px;padding:1rem}
.pill{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500;white-space:nowrap;display:inline-block}
.flag-b{background:#FCEBEB;color:#A32D2D;border-radius:6px;padding:6px 10px;font-size:12px;margin-bottom:6px;display:flex;gap:6px}
.sec-row{background:var(--bg-primary);border:0.5px solid var(--border-t);border-radius:10px;margin-bottom:10px;overflow:hidden}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;flex-wrap:wrap}
.kb-board{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;align-items:start}
.kb-col{border-radius:10px;padding:.75rem;min-height:160px}
.kb-card{border-radius:8px;padding:.625rem .75rem;margin-bottom:8px;cursor:grab;user-select:none;border:0.5px solid var(--border-t)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.stat-c{background:var(--bg-secondary);border-radius:8px;padding:.75rem 1rem}
.owner-tags{display:flex;gap:4px;flex-wrap:wrap}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:var(--bg-primary);border-radius:16px;padding:1.5rem;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;border:0.5px solid var(--border-s)}
.modal h2{font-size:17px;font-weight:500;margin-bottom:6px}
.modal p{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:14px}
.changes-list{border:0.5px solid var(--border-t);border-radius:8px;overflow:hidden;margin-bottom:14px}
.change-item{padding:10px 14px;border-bottom:0.5px solid var(--border-t);font-size:13px;display:flex;gap:10px;align-items:flex-start}
.change-item:last-child{border-bottom:none}
.change-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;flex-shrink:0;margin-top:1px}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-primary{font-size:13px;padding:8px 18px;border-radius:8px;border:none;background:#378ADD;color:#fff;font-weight:500}
.btn-primary:hover{background:#2a72c4}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-sec{font-size:13px;padding:8px 18px;border-radius:8px;border:0.5px solid var(--border-s);background:none;color:var(--text-secondary)}
.pulse{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){.g4{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}.kb-board{grid-template-columns:repeat(2,1fr)}}
</style>

// ---- AI Sprint Import Modal ----
const AI_SYSTEM=`You are a project management assistant for the Intact SE Playbook initiative. 
You will receive the current state of a project planning tool (sections and action items) and a sprint review transcript.
Analyse the transcript carefully and return ONLY a valid JSON object with this exact structure — no markdown, no explanation:

{
  "summary": "2-3 sentence plain English summary of what changed this sprint",
  "sectionUpdates": [
    {
      "num": <section number, use string for "11–13">,
      "changes": {
        "status": "<new status if changed, else omit>",
        "flag": "<new flag text if changed, empty string to clear, else omit>",
        "notes": "<appended note if new context emerged, else omit>",
        "tasksToAdd": [{"task":"<text>","status":"Not Started"}],
        "tasksToComplete": ["<exact task text to mark Done>"],
        "tasksToUpdate": [{"task":"<exact existing task text>","newStatus":"<status>"}]
      }
    }
  ],
  "actionsToComplete": [<id numbers of actions mentioned as done>],
  "actionsToAdd": [
    {"owner":"<David|Steven|Stefan|Tom|All>","action":"<text>","due":"<date>","dep":"<dependency or empty>","status":"Committed","type":"action"}
  ],
  "questionsToResolve": [<id numbers of questions that were answered/resolved>],
  "questionsToAdd": [
    {"owner":"David","action":"<question text>","due":"TBD","dep":"","status":"Decision Needed","type":"question"}
  ]
}

Rules:
- Owners must be exactly: David, Steven, Stefan, Tom, or combinations like "Steven + Stefan", or "All"
- Valid statuses: Not Started, Collecting, In Progress, In Cleanup, Done, Blocked
- Only include fields that actually changed — omit unchanged fields
- Be conservative: only mark things Done if explicitly stated as completed in the transcript
- New action items should reflect commitments made in the meeting
- Return ONLY the JSON object, nothing else`;

function SprintModal({sections,actions,onApply,onClose}){
  const [transcript,setTranscript]=useState("");
  const [stage,setStage]=useState("input"); // input | thinking | review | applying
  const [diff,setDiff]=useState(null);
  const [error,setError]=useState("");

  async function analyse(){
    if(!transcript.trim()){setError("Please paste the transcript first.");return;}
    setError("");setStage("thinking");
    const currentState=JSON.stringify({sections:sections.map(s=>({num:s.num,title:s.title,owner:s.owner,status:s.status,flag:s.flag,tasks:s.tasks})),actions});
    try{
      const res=await fetch(AI_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system:AI_SYSTEM,messages:[{role:"user",content:`CURRENT STATE:\n${currentState}\n\nSPRINT TRANSCRIPT:\n${transcript}`}]})});
      const data=await res.json();
      const text=data.content?.[0]?.text||"";
      const clean=text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      setDiff(parsed);setStage("review");
    }catch(e){setError("Failed to analyse transcript. Please try again.");setStage("input");}
  }

  function applyDiff(){
    setStage("applying");
    let newSections=[...sections];
    let newActions=[...actions];
    const d=diff;

    // Apply section updates
    (d.sectionUpdates||[]).forEach(u=>{
      const idx=newSections.findIndex(s=>String(s.num)===String(u.num));
      if(idx===-1)return;
      const s={...newSections[idx]};
      const c=u.changes||{};
      if(c.status!==undefined)s.status=c.status;
      if(c.flag!==undefined)s.flag=c.flag;
      if(c.notes!==undefined)s.notes=s.notes+(s.notes?"\n\n":"")+c.notes;
      if(c.tasksToAdd?.length)s.tasks=[...s.tasks,...c.tasksToAdd];
      if(c.tasksToComplete?.length)s.tasks=s.tasks.map(t=>c.tasksToComplete.includes(t.task)?{...t,status:"Done"}:t);
      if(c.tasksToUpdate?.length)s.tasks=s.tasks.map(t=>{const u2=c.tasksToUpdate.find(x=>x.task===t.task);return u2?{...t,status:u2.newStatus}:t;});
      newSections[idx]=s;
    });

    // Complete actions
    (d.actionsToComplete||[]).forEach(id=>{newActions=newActions.map(a=>a.id===id?{...a,status:"Done"}:a);});

    // Add new actions
    const maxId=Math.max(0,...newActions.map(a=>a.id));
    (d.actionsToAdd||[]).forEach((a,i)=>{newActions.push({...a,id:maxId+i+1});});

    // Resolve questions
    (d.questionsToResolve||[]).forEach(id=>{newActions=newActions.map(a=>a.id===id?{...a,status:"Done"}:a);});

    // Add new questions
    const maxId2=Math.max(0,...newActions.map(a=>a.id));
    (d.questionsToAdd||[]).forEach((q,i)=>{newActions.push({...q,id:maxId2+i+1});});

    onApply(newSections,newActions);
    onClose();
  }

  const changeCount=(diff?.sectionUpdates?.length||0)+(diff?.actionsToComplete?.length||0)+(diff?.actionsToAdd?.length||0)+(diff?.questionsToResolve?.length||0)+(diff?.questionsToAdd?.length||0);

  return (
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
          <h2>📋 Update from sprint review</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:"var(--text-tertiary)",lineHeight:1}}>×</button>
        </div>

        {stage==="input"&&<>
          <p>Paste your sprint review transcript below. Claude will analyse it, show you a preview of all proposed changes, and apply them with one click.</p>
          <textarea value={transcript} onChange={e=>setTranscript(e.target.value)} placeholder="Paste transcript here…" style={{width:"100%",height:200,marginBottom:10,fontSize:12,padding:"8px 10px",borderRadius:8,border:"0.5px solid var(--border-s)"}}/>
          {error&&<div style={{color:"#A32D2D",fontSize:12,marginBottom:10}}>⚠ {error}</div>}
          <div className="btn-row">
            <button className="btn-sec" onClick={onClose}>Cancel</button>
            <button className="btn-primary" onClick={analyse} disabled={!transcript.trim()}>Analyse transcript →</button>
          </div>
        </>}

        {stage==="thinking"&&<>
          <p>Analysing your transcript…</p>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,padding:"2rem 0"}}>
            <div style={{width:36,height:36,border:"3px solid var(--border-s)",borderTopColor:"#378ADD",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
            <div style={{fontSize:13,color:"var(--text-secondary)"}} className="pulse">Reading transcript and identifying changes…</div>
          </div>
        </>}

        {stage==="review"&&diff&&<>
          <p style={{marginBottom:8}}><strong>Summary:</strong> {diff.summary}</p>
          <p style={{marginBottom:10,color:"var(--text-secondary)"}}>Found <strong>{changeCount}</strong> change{changeCount!==1?"s":""} to apply. Review below then confirm.</p>
          <div className="changes-list">
            {(diff.sectionUpdates||[]).map((u,i)=>{
              const s=sections.find(x=>String(x.num)===String(u.num));
              const c=u.changes||{};
              const items=[];
              if(c.status)items.push(`Status → ${c.status}`);
              if(c.flag!==undefined)items.push(c.flag?`Flag: ${c.flag}`:"Flag cleared");
              if(c.notes)items.push("Notes updated");
              (c.tasksToAdd||[]).forEach(t=>items.push(`New task: ${t.task}`));
              (c.tasksToComplete||[]).forEach(t=>items.push(`Completed: ${t}`));
              (c.tasksToUpdate||[]).forEach(t=>items.push(`${t.task} → ${t.newStatus}`));
              return items.map((item,j)=>(
                <div key={`s${i}${j}`} className="change-item">
                  <span className="change-tag" style={{background:"#E6F1FB",color:"#185FA5"}}>§{u.num}</span>
                  <span>{s?.title} — {item}</span>
                </div>
              ));
            })}
            {(diff.actionsToComplete||[]).map(id=>{const a=actions.find(x=>x.id===id);return <div key={`ac${id}`} className="change-item"><span className="change-tag" style={{background:"#EAF3DE",color:"#3B6D11"}}>Done</span><span>Action #{id}: {a?.action||"Unknown"}</span></div>;})}
            {(diff.actionsToAdd||[]).map((a,i)=><div key={`aa${i}`} className="change-item"><span className="change-tag" style={{background:"#FAEEDA",color:"#633806"}}>New</span><span>{a.owner} — {a.action} (due: {a.due})</span></div>)}
            {(diff.questionsToResolve||[]).map(id=>{const q=actions.find(x=>x.id===id);return <div key={`qr${id}`} className="change-item"><span className="change-tag" style={{background:"#EAF3DE",color:"#3B6D11"}}>Resolved</span><span>Q #{id}: {q?.action||"Unknown"}</span></div>;})}
            {(diff.questionsToAdd||[]).map((q,i)=><div key={`qa${i}`} className="change-item"><span className="change-tag" style={{background:"#EEEDFE",color:"#3C3489"}}>New Q</span><span>{q.action}</span></div>)}
            {changeCount===0&&<div className="change-item"><span style={{color:"var(--text-secondary)",fontSize:13}}>No changes detected in this transcript.</span></div>}
          </div>
          <div className="btn-row">
            <button className="btn-sec" onClick={()=>{setStage("input");setDiff(null);}}>← Re-paste</button>
            <button className="btn-sec" onClick={onClose}>Cancel</button>
            <button className="btn-primary" onClick={applyDiff} disabled={changeCount===0}>Apply {changeCount} change{changeCount!==1?"s":""}</button>
          </div>
        </>}

        {stage==="applying"&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,padding:"2rem 0"}}>
          <div style={{width:36,height:36,border:"3px solid var(--border-s)",borderTopColor:"#1D9E75",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
          <div style={{fontSize:13,color:"var(--text-secondary)"}}>Applying changes and syncing…</div>
        </div>}
      </div>
    </div>
  );
}

// ---- Dashboard ----
function Dashboard({sections,actions}){
  const total=sections.length,done=sections.filter(s=>s.status==="Done").length;
  const actv=sections.filter(s=>["In Progress","In Cleanup","Collecting"].includes(s.status)).length;
  const blkd=sections.filter(s=>s.status==="Blocked").length,ns=sections.filter(s=>s.status==="Not Started").length;
  const pct=Math.round((done/total)*100);
  const allT=sections.flatMap(s=>s.tasks.map(t=>({...t,section:s.title,sn:s.num,prio:s.prio})));
  const actT=allT.filter(t=>["In Progress","In Cleanup"].includes(t.status));
  const openA=actions.filter(a=>a.type==="action"&&a.status!=="Done");
  const openQ=actions.filter(a=>a.type==="question"&&a.status!=="Done");
  const flags=sections.filter(s=>s.flag);
  const bc=pct>=70?"#1D9E75":pct>=40?"#378ADD":"#BA7517";
  const om={};
  sections.forEach(s=>s.owner.split("+").map(o=>o.trim()).forEach(o=>{if(!om[o])om[o]={total:0,done:0,actv:0};om[o].total++;if(s.status==="Done")om[o].done++;if(["In Progress","In Cleanup","Collecting"].includes(s.status))om[o].actv++;}));
  return(
    <div>
      <div className="card-sec" style={{marginBottom:"1rem",padding:"1.25rem 1.5rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:10,flexWrap:"wrap",gap:8}}>
          <div><div style={{fontSize:13,color:"var(--text-secondary)",marginBottom:2}}>Overall playbook completion</div><div style={{fontSize:32,fontWeight:500}}>{pct}%</div></div>
          <div style={{fontSize:12,color:"var(--text-secondary)"}}>{done} of {total} sections complete</div>
        </div>
        <div style={{height:10,background:"var(--bg-primary)",borderRadius:99,overflow:"hidden",border:"0.5px solid var(--border-t)"}}>
          <div style={{height:"100%",width:`${pct}%`,background:bc,borderRadius:99}}/>
        </div>
        <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
          {[["Done",done,"#EAF3DE","#3B6D11"],["Active",actv,"#E6F1FB","#185FA5"],["Not Started",ns,"#F1EFE8","#5F5E5A"],["Blocked",blkd,"#FCEBEB","#A32D2D"]].map(([l,v,bg,c])=>(
            <span key={l} className="pill" style={{fontSize:11,padding:"3px 10px",background:bg,color:c}}>{l}: {v}</span>
          ))}
        </div>
      </div>
      <div className="g4"><SC label="Total tasks" val={allT.length}/><SC label="Active tasks" val={actT.length} color="#185FA5"/><SC label="Open actions" val={openA.length} color="#633806"/><SC label="Open questions" val={openQ.length} color="#3C3489"/></div>
      <div className="two-col">
        <div className="card">
          <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Active tasks</div>
          {actT.length===0&&<div style={{fontSize:12,color:"var(--text-tertiary)"}}>No active tasks.</div>}
          {actT.map((t,i)=>(
            <div key={i} style={{borderBottom:"0.5px solid var(--border-t)",paddingBottom:8,marginBottom:8}}>
              <div style={{display:"flex",gap:6,marginBottom:3,flexWrap:"wrap"}}><SPill status={t.status} small/><Pill label={t.prio} bg={PS[t.prio]?.bg} text={PS[t.prio]?.text}/></div>
              <div style={{fontSize:12,lineHeight:1.4,marginBottom:2}}>{t.task}</div>
              <div style={{fontSize:11,color:"var(--text-tertiary)"}}>§{t.sn} {t.section}</div>
            </div>
          ))}
        </div>
        <div className="card">
          <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Open actions</div>
          {openA.length===0&&<div style={{fontSize:12,color:"var(--text-tertiary)"}}>All actions complete!</div>}
          {openA.slice(0,7).map((a,i)=>(
            <div key={i} style={{borderBottom:"0.5px solid var(--border-t)",paddingBottom:8,marginBottom:8}}>
              <div style={{display:"flex",gap:6,marginBottom:3,flexWrap:"wrap"}}><span className="pill" style={{fontSize:11,background:(ASC[a.status]||"#888")+"22",color:ASC[a.status]||"#888"}}>{a.status}</span><span style={{fontSize:11,color:"var(--text-tertiary)"}}>{a.due}</span></div>
              <div style={{fontSize:12,lineHeight:1.4,marginBottom:4}}>{a.action}</div>
              <OTag owner={a.owner}/>
            </div>
          ))}

        </div>
      </div>
      <div className="card" style={{marginBottom:"1rem"}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Owner workload</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
          {["David","Steven","Stefan","Tom"].map(name=>{
            const d=om[name]||{total:0,done:0,actv:0};
            const p=d.total>0?Math.round((d.done/d.total)*100):0;
            const c=OC[name];
            const myA=actions.filter(a=>a.owner.includes(name)&&a.type==="action"&&a.status!=="Done");
            return(
              <div key={name} className="card-sec" style={{padding:".75rem"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:c+"22",border:`1.5px solid ${c}66`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:c}}>{name[0]}</div>
                  <span style={{fontSize:13,fontWeight:500}}>{name}</span>
                </div>
                <div style={{fontSize:11,color:"var(--text-secondary)",marginBottom:6}}>{d.total} sections · {d.actv} active · {myA.length} actions</div>
                <div style={{height:5,background:"var(--bg-primary)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${p}%`,background:c,borderRadius:99}}/></div>
                <div style={{fontSize:11,color:"var(--text-tertiary)",marginTop:3}}>{p}% complete</div>
              </div>
            );
          })}
        </div>
      </div>
      {flags.length>0&&<div className="card"><div style={{fontSize:13,fontWeight:500,marginBottom:8}}>Active flags & blockers</div>{flags.map((s,i)=><FlagB key={i} text={`§${s.num} ${s.title}: ${s.flag}`}/>)}</div>}
    </div>
  );
}

// ---- Kanban ----
function Kanban({sections,setSections}){
  const di=useRef(null);
  const onDS=(e,i)=>{di.current=i;e.dataTransfer.effectAllowed="move";};
  const onDrop=(e,col)=>{e.preventDefault();if(di.current===null)return;const n=[...sections];n[di.current]={...n[di.current],status:col};setSections(n);di.current=null;};
  const onDO=e=>e.preventDefault();
  return(
    <div>
      <div style={{fontSize:12,color:"var(--text-secondary)",marginBottom:12}}>Drag cards between columns or use the dropdown. Changes sync to all team members automatically.</div>
      <div className="kb-board">
        {KB_COLS.map(col=>{
          const cs=SS[col],colS=sections.filter(s=>s.status===col);
          return(
            <div key={col} className="kb-col" style={{background:"var(--bg-secondary)"}} onDragOver={onDO} onDrop={e=>onDrop(e,col)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:12,fontWeight:500,color:cs.text}}>{col}</span>
                <span className="pill" style={{fontSize:11,background:cs.bg,color:cs.text,border:`1px solid ${cs.border}`}}>{colS.length}</span>
              </div>
              {colS.map(s=>{
                const gi=sections.findIndex(x=>x.num===s.num);
                const td=s.tasks.filter(t=>t.status==="Done").length,tp=s.tasks.length>0?Math.round((td/s.tasks.length)*100):0;
                const oc=OC[s.owner.split(/[+ ]/)[0]]||"#888";
                return(
                  <div key={String(s.num)} className="kb-card" style={{background:"var(--bg-primary)"}} draggable onDragStart={e=>onDS(e,gi)}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5,gap:4}}>
                      <span style={{fontSize:11,fontWeight:500,lineHeight:1.3}}>§{s.num} {s.title}</span>
                      <Pill label={s.prio} bg={PS[s.prio]?.bg} text={PS[s.prio]?.text}/>
                    </div>
                    <OTag owner={s.owner}/>
                    {s.flag&&<div style={{fontSize:10,color:"#A32D2D",background:"#FCEBEB",borderRadius:4,padding:"2px 6px",marginTop:5}}>⚑ Flagged</div>}
                    <div style={{marginTop:6,fontSize:10,color:"var(--text-tertiary)",marginBottom:3}}>{td}/{s.tasks.length} tasks done</div>
                    <div style={{height:3,background:"var(--bg-secondary)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${tp}%`,background:oc,borderRadius:99}}/></div>
                    <div style={{marginTop:6}}><Sel value={s.status} options={ALL_ST} onChange={v=>{const n=[...sections];n[gi]={...n[gi],status:v};setSections(n);}} small/></div>
                  </div>
                );
              })}
              {colS.length===0&&<div style={{fontSize:11,color:"var(--text-tertiary)",textAlign:"center",padding:"1rem 0",opacity:.4}}>Drop here</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ---- Project Plan ----
function ProjectPlan({sections,setSections}){
  const [open,setOpen]=useState(null);
  const upd=(i,f,v)=>{const n=[...sections];n[i]={...n[i],[f]:v};setSections(n);};
  const updT=(si,ti,f,v)=>{const n=[...sections];const t=[...n[si].tasks];t[ti]={...t[ti],[f]:v};n[si]={...n[si],tasks:t};setSections(n);};
  const addT=si=>{const n=[...sections];n[si].tasks=[...n[si].tasks,{task:"New task",status:"Not Started"}];setSections(n);};
  const rmT=(si,ti)=>{const n=[...sections];n[si].tasks=n[si].tasks.filter((_,j)=>j!==ti);setSections(n);};
  return(
    <div>
      <div className="g4"><SC label="Sections" val={sections.length}/><SC label="Prio 1" val={sections.filter(s=>s.prio==="P1").length} color="#A32D2D"/><SC label="Active" val={sections.filter(s=>["In Progress","In Cleanup","Collecting"].includes(s.status)).length} color="#185FA5"/><SC label="Done" val={sections.filter(s=>s.status==="Done").length} color="#3B6D11"/></div>
      {sections.map((s,si)=>(
        <div key={si} className="sec-row">
          <div className="sec-hdr">
            <span style={{fontSize:12,color:"var(--text-tertiary)",minWidth:20}}>{s.num}</span>
            <span style={{fontSize:13,fontWeight:500,flex:1}}>{s.title}</span>
            <OTag owner={s.owner}/>
            <Sel value={s.prio} options={ALL_PR} onChange={v=>upd(si,"prio",v)} small/>
            <Sel value={s.status} options={ALL_ST} onChange={v=>upd(si,"status",v)} small/>
            <button onClick={()=>setOpen(open===si?null:si)} style={{fontSize:12,background:"none",border:"none",color:"var(--text-tertiary)",padding:0}}>{open===si?"▲":"▼"}</button>
          </div>
          {open===si&&(
            <div style={{padding:"0 1rem 1rem",borderTop:"0.5px solid var(--border-t)"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10,marginBottom:10}}>
                <div><div style={{fontSize:11,color:"var(--text-secondary)",marginBottom:4}}>Owner</div><Sel value={s.owner} options={OWNERS} onChange={v=>upd(si,"owner",v)}/></div>
                <div><div style={{fontSize:11,color:"var(--text-secondary)",marginBottom:4}}>Flag / blocker</div><Txt value={s.flag} onChange={v=>upd(si,"flag",v)}/></div>
              </div>
              {s.flag&&<FlagB text={s.flag}/>}
              <div style={{fontSize:11,color:"var(--text-secondary)",marginBottom:6}}>Tasks</div>
              {s.tasks.map((t,ti)=>(
                <div key={ti} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <Sel value={t.status} options={ALL_ST} onChange={v=>updT(si,ti,"status",v)} small/>
                  <Txt value={t.task} onChange={v=>updT(si,ti,"task",v)} style={{fontSize:12}}/>
                  <button onClick={()=>rmT(si,ti)} style={{fontSize:14,color:"#A32D2D",background:"none",border:"none",padding:"0 4px",flexShrink:0}}>×</button>
                </div>
              ))}
              <button className="add-btn" onClick={()=>addT(si)}>+ Add task</button>
              <div style={{marginTop:10}}><div style={{fontSize:11,color:"var(--text-secondary)",marginBottom:4}}>Notes</div><Txt value={s.notes} onChange={v=>upd(si,"notes",v)} multi/></div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ---- Action Items ----
function ActionItems({actions,setActions}){
  const [editId,setEditId]=useState(null);
  const [view,setView]=useState("action");
  const upd=(id,f,v)=>setActions(prev=>prev.map(a=>a.id===id?{...a,[f]:v}:a));
  const add=type=>{const id=Math.max(0,...actions.map(a=>a.id))+1;setActions([...actions,{id,owner:"David",action:type==="question"?"New open question":"New action item",due:"TBD",dep:"",status:type==="question"?"Decision Needed":"Committed",type}]);};
  const rm=id=>setActions(prev=>prev.filter(a=>a.id!==id));
  const filtered=actions.filter(a=>a.type===view);
  const ac=actions.filter(a=>a.type==="action"),qc=actions.filter(a=>a.type==="question");
  return(
    <div>
      <div style={{display:"flex",gap:4,marginBottom:"1.25rem"}}>
        {[["action","Action Items"],["question","Open Questions"]].map(([v,l])=>(
          <button key={v} className={`tab-btn ${view===v?"active":""}`} onClick={()=>setView(v)}>{l}</button>
        ))}
      </div>
      {view==="action"&&<div className="g4"><SC label="Total" val={ac.length}/><SC label="Urgent" val={ac.filter(a=>a.status==="Urgent").length} color="#A32D2D"/><SC label="Decision needed" val={ac.filter(a=>a.status==="Decision Needed").length} color="#633806"/><SC label="Done" val={ac.filter(a=>a.status==="Done").length} color="#3B6D11"/></div>}
      {view==="question"&&<div className="g3"><SC label="Total" val={qc.length}/><SC label="Open" val={qc.filter(a=>a.status!=="Done").length} color="#3C3489"/><SC label="Resolved" val={qc.filter(a=>a.status==="Done").length} color="#3B6D11"/></div>}
      {filtered.map(a=>(
        <div key={a.id} style={{background:"var(--bg-primary)",border:`0.5px solid ${a.status==="Urgent"?"#F09595":a.status==="Done"?"#97C459":a.type==="question"?"#AFA9EC":"var(--border-t)"}`,borderRadius:8,padding:".75rem 1rem",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                {a.type==="question"&&<span className="pill" style={{fontSize:11,background:"#EEEDFE",color:"#3C3489"}}>?</span>}
                <Sel value={a.status} options={a.type==="question"?["Decision Needed","In Progress","Done"]:ALL_AS} onChange={v=>upd(a.id,"status",v)} small/>
                {editId===a.id?<Sel value={a.owner} options={OWNERS} onChange={v=>upd(a.id,"owner",v)} small/>:<OTag owner={a.owner}/>}
                {editId===a.id?<Txt value={a.due} onChange={v=>upd(a.id,"due",v)} style={{fontSize:11,width:100}}/>:<span style={{fontSize:11,color:"var(--text-tertiary)"}}>Due: {a.due}</span>}
              </div>
              {editId===a.id?<Txt value={a.action} onChange={v=>upd(a.id,"action",v)} multi/>:<div style={{fontSize:13,color:a.status==="Done"?"var(--text-secondary)":"var(--text-primary)",textDecoration:a.status==="Done"?"line-through":"none",lineHeight:1.5}}>{a.action}</div>}
              {editId===a.id&&a.type==="action"&&<div style={{marginTop:6}}><div style={{fontSize:11,color:"var(--text-secondary)",marginBottom:3}}>Dependency</div><Txt value={a.dep} onChange={v=>upd(a.id,"dep",v)} style={{fontSize:12}}/></div>}
              {a.dep&&editId!==a.id&&<div style={{fontSize:11,color:"#633806",background:"#FAEEDA",borderRadius:4,padding:"3px 8px",marginTop:6,display:"inline-block"}}>◆ {a.dep}</div>}
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}}>
              <button style={{fontSize:11,padding:"3px 8px",borderRadius:6,border:"0.5px solid var(--border-s)",background:"none",color:"var(--text-secondary)"}} onClick={()=>setEditId(editId===a.id?null:a.id)}>{editId===a.id?"Done":"Edit"}</button>
              <button style={{fontSize:11,padding:"3px 8px",borderRadius:6,border:"0.5px solid #F09595",background:"none",color:"#A32D2D"}} onClick={()=>rm(a.id)}>×</button>
            </div>
          </div>
        </div>
      ))}
      <button style={{fontSize:13,padding:"7px 16px",borderRadius:8,border:"0.5px solid var(--border-s)",background:"var(--bg-secondary)",color:"var(--text-primary)",marginTop:4}} onClick={()=>add(view)}>+ Add {view==="question"?"open question":"action item"}</button>
    </div>
  );
}

// ---- Root ----
function App(){
  const [tab,setTab]=useState(0);
  const [sections,setSS]=useState(DEF_S);
  const [actions,setAS]=useState(DEF_A);
  const [loaded,setLoaded]=useState(false);
  const [sync,setSync]=useState("idle");
  const [showImport,setShowImport]=useState(false);
  const timer=useRef(null);

  useEffect(()=>{
    dbGet().then(d=>{
      if(d?.sections)setSS(d.sections);
      if(d?.actions)setAS(d.actions);
      setLoaded(true);
    }).catch(()=>setLoaded(true));
  },[]);

  const persist=useCallback((s,a)=>{
    if(timer.current)clearTimeout(timer.current);
    setSync("syncing");
    timer.current=setTimeout(()=>{
      dbSet({sections:s,actions:a}).then(()=>{setSync("saved");setTimeout(()=>setSync("idle"),3000);}).catch(()=>setSync("error"));
    },900);
  },[]);

  const setSections=v=>{setSS(v);persist(v,actions);};
  const setActions=v=>{setAS(v);persist(sections,v);};

  const applyImport=(newS,newA)=>{setSS(newS);setAS(newA);persist(newS,newA);};

  const reset=()=>{if(!confirm("Reset all data to original defaults? This cannot be undone."))return;setSS(DEF_S);setAS(DEF_A);persist(DEF_S,DEF_A);};

  if(!loaded)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",flexDirection:"column",gap:12}}>
      <div style={{width:36,height:36,border:"3px solid var(--border-s)",borderTopColor:"#378ADD",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{fontSize:14,color:"var(--text-secondary)"}}>Loading shared workspace…</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  return(
    <div>
      {showImport&&<SprintModal sections={sections} actions={actions} onApply={applyImport} onClose={()=>setShowImport(false)}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.25rem",flexWrap:"wrap",gap:8}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:500,marginBottom:4}}>SE Playbook — Project Planning Tool</h1>
          <p style={{fontSize:13,color:"var(--text-secondary)"}}>Intact · Shared workspace · David · Steven · Stefan · Tom</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <SyncDot status={sync}/>
          <button onClick={()=>setShowImport(true)} style={{fontSize:13,padding:"7px 14px",borderRadius:8,border:"none",background:"#378ADD",color:"#fff",fontWeight:500}}>📋 Update from sprint</button>
          <button onClick={reset} style={{fontSize:11,padding:"4px 10px",borderRadius:6,border:"0.5px solid var(--border-s)",background:"none",color:"var(--text-tertiary)"}}>Reset</button>
        </div>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:"1.25rem",flexWrap:"wrap"}}>
        {TABS.map((t,i)=><button key={t} className={`tab-btn ${tab===i?"active":""}`} onClick={()=>setTab(i)}>{t}</button>)}
      </div>
      {tab===0&&<Dashboard sections={sections} actions={actions}/>}
      {tab===1&&<Kanban sections={sections} setSections={setSections}/>}
      {tab===2&&<ProjectPlan sections={sections} setSections={setSections}/>}
      {tab===3&&<ActionItems actions={actions} setActions={setActions}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
