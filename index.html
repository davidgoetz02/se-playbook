<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bp:#fff;--bs:#f5f5f3;--bt:#eeece6;--tp:#1a1a18;--ts:#6b6b67;--tt:#9b9b96;--bdt:rgba(0,0,0,0.12);--bds:rgba(0,0,0,0.22);--bdp:rgba(0,0,0,0.35);--fn:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bp:#1e1e1c;--bs:#2a2a28;--bt:#333330;--tp:#f0ede6;--ts:#a0a09a;--tt:#6a6a64;--bdt:rgba(255,255,255,0.1);--bds:rgba(255,255,255,0.18);--bdp:rgba(255,255,255,0.28)}}
body{font-family:var(--fn);background:var(--bt);color:var(--tp);min-height:100vh}
#root{max-width:1000px;margin:0 auto;padding:1.5rem 1rem;position:relative;z-index:1}
input,textarea,select{font-family:var(--fn);background:var(--bp);color:var(--tp);border:0.5px solid var(--bdt);border-radius:var(--r);padding:5px 9px;font-size:13px;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--bds)}
button{font-family:var(--fn);cursor:pointer}
textarea{resize:vertical;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--bds);border-radius:99px}
.tab-btn{font-size:13px;padding:6px 16px;border-radius:var(--r);border:0.5px solid var(--bds);background:var(--bp);color:var(--tp);transition:all .15s}
.tab-btn.active{font-weight:500;border:1.5px solid var(--bdp);background:var(--bs)}
.card{background:var(--bp);border:0.5px solid var(--bdt);border-radius:var(--rl);padding:1rem}
.card-s{background:var(--bs);border-radius:var(--rl);padding:1rem}
.pill{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500;white-space:nowrap;display:inline-block}
.flag-b{background:#FCEBEB;color:#A32D2D;border-radius:6px;padding:6px 10px;font-size:12px;margin-bottom:6px;display:flex;gap:6px}
.sec-row{background:var(--bp);border:0.5px solid var(--bdt);border-radius:10px;margin-bottom:10px;overflow:hidden}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;flex-wrap:wrap}
.kb-board{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;align-items:start}
.kb-col{border-radius:10px;padding:.75rem;min-height:160px}
.kb-card{border-radius:8px;padding:.625rem .75rem;margin-bottom:8px;cursor:grab;user-select:none;border:0.5px solid var(--bdt)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.sc{background:var(--bs);border-radius:var(--r);padding:.75rem 1rem}
.owner-tags{display:flex;gap:4px;flex-wrap:wrap}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:var(--bp);border-radius:16px;padding:1.5rem;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;border:0.5px solid var(--bds)}
.modal h2{font-size:17px;font-weight:500;margin-bottom:6px}
.modal p{font-size:13px;color:var(--ts);line-height:1.6;margin-bottom:14px}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-p{font-size:13px;padding:8px 18px;border-radius:var(--r);border:none;background:#378ADD;color:#fff;font-weight:500}
.btn-p:hover{background:#2a72c4}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{font-size:13px;padding:8px 18px;border-radius:var(--r);border:0.5px solid var(--bds);background:none;color:var(--ts)}
.btn-d{font-size:12px;padding:5px 10px;border-radius:var(--r);border:0.5px solid #F09595;background:none;color:#A32D2D}
.changes-list{border:0.5px solid var(--bdt);border-radius:8px;overflow:hidden;margin-bottom:14px}
.change-item{padding:10px 14px;border-bottom:0.5px solid var(--bdt);font-size:13px;display:flex;gap:10px;align-items:flex-start}
.change-item:last-child{border-bottom:none}
.change-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;flex-shrink:0;margin-top:1px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;overflow:hidden}
.login-box{background:var(--bp);border:0.5px solid var(--bds);border-radius:16px;padding:2rem;width:100%;max-width:380px}
.login-box h1{font-size:22px;font-weight:500;margin-bottom:4px}
.login-box .sub{font-size:13px;color:var(--ts);margin-bottom:1.5rem}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:var(--ts);margin-bottom:4px;font-weight:500}
.form-group input,.form-group select{width:100%;padding:8px 10px}
.err-msg{font-size:12px;color:#A32D2D;background:#FCEBEB;border-radius:6px;padding:8px 10px;margin-bottom:12px}
.ok-msg{font-size:12px;color:#3B6D11;background:#EAF3DE;border-radius:6px;padding:8px 10px;margin-bottom:12px}
.admin-section{margin-bottom:1.5rem}
.admin-section h3{font-size:14px;font-weight:500;margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid var(--bdt)}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--bdt);flex-wrap:wrap}
.user-row:last-child{border-bottom:none}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag-item{display:flex;align-items:center;gap:4px;background:var(--bs);border:0.5px solid var(--bdt);border-radius:6px;padding:3px 8px;font-size:12px}
.my-todo-row{background:var(--bp);border:0.5px solid var(--bdt);border-radius:8px;padding:.75rem 1rem;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px}
.initiative-card{background:var(--bp);border:0.5px solid var(--bdt);border-radius:var(--rl);padding:1.25rem;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative}
.initiative-card:hover{border-color:var(--bds)}
.initiative-card.active-init{border:1.5px solid #378ADD}
.init-picker{display:flex;gap:4px;align-items:center;background:var(--bs);border:0.5px solid var(--bdt);border-radius:var(--r);padding:4px 10px;font-size:13px;cursor:pointer;color:var(--tp)}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){.g4{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}.kb-board{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const SB="https://xashkjovtidhgmqmthvy.supabase.co";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhhc2hram92dGlkaGdtcW10aHZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDA5MzQsImV4cCI6MjA5MDM3NjkzNH0.brfdv_UAXcok6VuM8-Hd7zCueg04dzFi-U4yyfQ8lJo";
const HDR={apikey:SK,Authorization:`Bearer ${SK}`,"Content-Type":"application/json"};
async function sbGet(t,f=""){const r=await fetch(`${SB}/rest/v1/${t}${f?`?${f}`:""}`,{headers:HDR});return r.json();}
async function sbPatch(t,f,b){await fetch(`${SB}/rest/v1/${t}?${f}`,{method:"PATCH",headers:{...HDR,Prefer:"return=minimal"},body:JSON.stringify(b)});}
async function sbPost(t,b){const r=await fetch(`${SB}/rest/v1/${t}`,{method:"POST",headers:{...HDR,Prefer:"return=representation"},body:JSON.stringify(b)});return r.json();}
async function sbDel(t,f){await fetch(`${SB}/rest/v1/${t}?${f}`,{method:"DELETE",headers:HDR});}
async function dbGetInitiatives(){const r=await sbGet("playbook","id=eq.initiatives&select=data");return r?.[0]?.data||{list:[]};}
async function dbSetInitiatives(d){await sbPatch("playbook","id=eq.initiatives",{data:d,updated_at:new Date().toISOString()});}
async function dbGetState(iid){const r=await sbGet("playbook",`id=eq.initiative:${iid}&select=data`);return r?.[0]?.data||null;}
async function dbSetState(iid,d){
  const r=await sbGet("playbook",`id=eq.initiative:${iid}&select=id`);
  if(r&&r.length>0){await sbPatch("playbook",`id=eq.initiative:${iid}`,{data:d,updated_at:new Date().toISOString()});}
  else{await sbPost("playbook",{id:`initiative:${iid}`,data:d});}
}
async function dbGetUsers(){return sbGet("playbook_users","select=username,role");}
async function dbGetConfig(){return sbGet("playbook_config","select=key,value");}
async function dbSetConfig(k,v){await sbPatch("playbook_config",`key=eq.${k}`,{value:v,updated_at:new Date().toISOString()});}
async function dbAddUser(u,p,r){return sbPost("playbook_users",{username:u,password_hash:p,role:r});}
async function dbDelUser(u){return sbDel("playbook_users",`username=eq.${u}`);}
async function dbSetPw(u,p){await sbPatch("playbook_users",`username=eq.${u}`,{password_hash:p});}
async function dbVerify(u,p){const r=await sbGet("playbook_users",`username=eq.${encodeURIComponent(u)}&select=username,password_hash,role`);if(!r||!r.length)return null;const x=r[0];return x.password_hash===p?{username:x.username,role:x.role}:null;}
async function dbSetRecovery(u,code){await sbPatch("playbook_users",`username=eq.${u}`,{password_hash:`RESET:${code}`});}

// --- UI Primitives ---
function SPill({status,small}){const s=SS_F[status]||SS_F["Not Started"];return <span className="pill" style={{fontSize:small?11:12,background:s.bg,color:s.text,border:`1px solid ${s.border}`}}>{status}</span>;}
function Pill({label,bg,text}){return <span className="pill" style={{background:bg||"#eee",color:text||"#333"}}>{label}</span>;}
function FlagB({text}){if(!text)return null;return <div className="flag-b"><span style={{flexShrink:0}}>⚑</span><span>{text}</span></div>;}
function OTag({owner,owners}){const parts=owner.split("+").map(p=>p.trim());return <div className="owner-tags">{parts.map(p=>{const c=oc(p,owners||[]);return <span key={p} className="pill" style={{fontSize:11,background:c+"18",border:`1px solid ${c}44`,color:c}}>{p}</span>;})}</div>;}
function Sel({value,options,onChange,small,sty={}}){return <select value={value} onChange={e=>onChange(e.target.value)} style={{fontSize:small?11:12,padding:"2px 4px",...sty}}>{options.map(o=><option key={o}>{o}</option>)}</select>;}
function Txt({value,onChange,multi,sty={},ph=""}){const s={fontSize:13,width:"100%",lineHeight:1.5,...sty};return multi?<textarea value={value} onChange={e=>onChange(e.target.value)} rows={2} style={s} placeholder={ph}/>:<input value={value} onChange={e=>onChange(e.target.value)} style={s} placeholder={ph}/>;}
function SC({label,val,color}){return <div className="sc"><div style={{fontSize:12,color:"var(--ts)",marginBottom:4}}>{label}</div><div style={{fontSize:22,fontWeight:500,color:color||"var(--tp)"}}>{val}</div></div>;}
function SyncDot({s}){const m={syncing:{c:"#EF9F27",t:"Syncing…"},saved:{c:"#1D9E75",t:"Saved ✓"},error:{c:"#A32D2D",t:"Sync failed"}};const x=m[s];if(!x)return null;return <span style={{fontSize:11,color:x.c,display:"flex",alignItems:"center",gap:5}}><span style={{width:7,height:7,borderRadius:"50%",background:x.c,display:"inline-block"}}/>{x.t}</span>;}
function Spinner({size=32}){return <div style={{width:size,height:size,border:"3px solid var(--bds)",borderTopColor:"#378ADD",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>;}

  return(
    <div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
      <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" style={{width:"100%",height:"100%",position:"absolute",inset:0}} xmlns="http://www.w3.org/2000/svg">

// --- Login ---
function LoginScreen({onLogin}){
  const [view,setView]=useState("login");
  const [uname,setUname]=useState("");const [pw,setPw]=useState("");
  const [newPw,setNewPw]=useState("");const [confirmPw,setConfirmPw]=useState("");
  const [resetCode,setResetCode]=useState("");const [generatedCode,setGeneratedCode]=useState("");
  const [err,setErr]=useState("");const [ok,setOk]=useState("");const [loading,setLoading]=useState(false);
  async function login(e){e.preventDefault();if(!uname||!pw){setErr("Please enter your name and password.");return;}setLoading(true);setErr("");const user=await dbVerify(uname,pw);setLoading(false);if(!user){setErr("Incorrect name or password.");return;}sessionStorage.setItem("sep_user",JSON.stringify(user));onLogin(user);}
  async function requestReset(e){e.preventDefault();if(!uname){setErr("Please enter your name.");return;}setLoading(true);setErr("");const rows=await sbGet("playbook_users",`username=eq.${encodeURIComponent(uname)}&select=username`);setLoading(false);if(!rows||!rows.length){setErr("No account found with that name.");return;}const code=Math.floor(100000+Math.random()*900000).toString();await dbSetRecovery(uname,code);setGeneratedCode(code);setView("reset");}
  async function doReset(e){e.preventDefault();if(!resetCode){setErr("Please enter the reset code.");return;}if(newPw.length<6){setErr("New password must be at least 6 characters.");return;}if(newPw!==confirmPw){setErr("Passwords do not match.");return;}setLoading(true);setErr("");const rows=await sbGet("playbook_users",`username=eq.${encodeURIComponent(uname)}&select=username,password_hash`);setLoading(false);if(!rows||!rows.length){setErr("User not found.");return;}if(rows[0].password_hash!==`RESET:${resetCode}`){setErr("Incorrect reset code.");return;}await dbSetPw(uname,newPw);setOk("Password reset successfully!");setView("login");setPw("");}
  return(
    <div className="login-wrap">
      <AppBackground/>
      <div className="login-box" style={{position:"relative",zIndex:1,boxShadow:"0 4px 32px rgba(0,0,0,0.12)"}}>
        <h1>SE Playbook Project Planner</h1>
        <p className="sub">Intact Solution Engineering</p>
        {view==="login"&&<>
          {err&&<div className="err-msg">{err}</div>}
          {ok&&<div className="ok-msg">{ok}</div>}
          <form onSubmit={login}>
            <div className="form-group"><label>Your name</label><input value={uname} onChange={e=>setUname(e.target.value)} placeholder="e.g. David" autoFocus/></div>
            <div className="form-group"><label>Password</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Enter your password"/></div>
            <button type="submit" className="btn-p" style={{width:"100%",marginTop:8}} disabled={loading}>{loading?"Signing in…":"Sign in →"}</button>
          </form>
          <div style={{textAlign:"center",marginTop:14}}><button onClick={()=>{setView("forgot");setErr("");setOk("");}} style={{background:"none",border:"none",fontSize:12,color:"var(--ts)",textDecoration:"underline",cursor:"pointer"}}>Forgot password?</button></div>
        </>}
        {view==="forgot"&&<>
          <div style={{marginBottom:12}}><button onClick={()=>{setView("login");setErr("");}} style={{background:"none",border:"none",fontSize:12,color:"var(--ts)",cursor:"pointer"}}>← Back</button></div>
          <p>Enter your name to generate a reset code to share with your admin.</p>
          {err&&<div className="err-msg">{err}</div>}
          <form onSubmit={requestReset}>
            <div className="form-group"><label>Your name</label><input value={uname} onChange={e=>setUname(e.target.value)} placeholder="e.g. Steven" autoFocus/></div>
            <button type="submit" className="btn-p" style={{width:"100%"}} disabled={loading}>{loading?"Generating…":"Generate reset code"}</button>
          </form>
        </>}
        {view==="reset"&&<>
          <div style={{marginBottom:12}}><button onClick={()=>{setView("login");setErr("");}} style={{background:"none",border:"none",fontSize:12,color:"var(--ts)",cursor:"pointer"}}>← Back</button></div>
          {generatedCode&&<div style={{background:"#FAEEDA",border:"1px solid #EF9F27",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#633806"}}><div style={{fontWeight:500,marginBottom:4}}>Reset code generated</div><div>Code: <strong style={{fontSize:16,letterSpacing:2}}>{generatedCode}</strong></div><div style={{fontSize:11,marginTop:4}}>Share this with {uname} — single use.</div></div>}
          {err&&<div className="err-msg">{err}</div>}
          <form onSubmit={doReset}>
            <div className="form-group"><label>Reset code</label><input value={resetCode} onChange={e=>setResetCode(e.target.value)} placeholder="6-digit code"/></div>
            <div className="form-group"><label>New password</label><input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="At least 6 characters"/></div>
            <div className="form-group"><label>Confirm new password</label><input type="password" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)}/></div>
            <button type="submit" className="btn-p" style={{width:"100%"}} disabled={loading}>{loading?"Resetting…":"Reset password"}</button>
          </form>
        </>}
      </div>
    </div>
  );
}

// --- Change Password Modal ---
function ChangePwModal({user,onClose}){
  const [cur,setCur]=useState("");const [nw,setNw]=useState("");const [conf,setConf]=useState("");
  const [err,setErr]=useState("");const [ok,setOk]=useState(false);const [loading,setLoading]=useState(false);
  async function submit(e){e.preventDefault();if(!cur||!nw||!conf){setErr("Please fill in all fields.");return;}if(nw.length<6){setErr("New password must be at least 6 characters.");return;}if(nw!==conf){setErr("Passwords do not match.");return;}setLoading(true);setErr("");const verified=await dbVerify(user.username,cur);if(!verified){setLoading(false);setErr("Current password is incorrect.");return;}await dbSetPw(user.username,nw);setLoading(false);setOk(true);setTimeout(()=>onClose(true),1500);}
  return(
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose(false);}}>
      <div className="modal" style={{maxWidth:400}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{marginBottom:0}}>Change password</h2><button onClick={()=>onClose(false)} style={{background:"none",border:"none",fontSize:20,color:"var(--tt)",lineHeight:1}}>×</button></div>
        {ok?<div className="ok-msg">Password changed successfully!</div>:<>
          {err&&<div className="err-msg">{err}</div>}
          <form onSubmit={submit}>
            <div className="form-group"><label>Current password</label><input type="password" value={cur} onChange={e=>setCur(e.target.value)} autoFocus/></div>
            <div className="form-group"><label>New password</label><input type="password" value={nw} onChange={e=>setNw(e.target.value)} placeholder="At least 6 characters"/></div>
            <div className="form-group"><label>Confirm new password</label><input type="password" value={conf} onChange={e=>setConf(e.target.value)}/></div>
            <div className="btn-row"><button type="button" className="btn-s" onClick={()=>onClose(false)}>Cancel</button><button type="submit" className="btn-p" disabled={loading}>{loading?"Saving…":"Save password"}</button></div>
          </form>
        </>}
      </div>
    </div>
  );
}

Rules: only include changed fields; only mark Done if explicitly stated; conservative approach.`;

function SprintModal({sections,actions,owners,onApply,onClose}){

    const state=JSON.stringify({sections:sections.map(s=>({num:s.num,title:s.title,owner:s.owner,status:s.status,flag:s.flag,tasks:s.tasks})),actions:actions.map(a=>({id:a.id,owner:a.owner,action:a.action,due:a.due,status:a.status,type:a.type}))});
    try{
      const res=await fetch("/api/analyse",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system:AI_SYS,messages:[{role:"user",content:`CURRENT STATE:\n${state}\n\nSPRINT TRANSCRIPT:\n${text}\n\nReturn ONLY the JSON object.`}]})});
      if(!res.ok){const e=await res.json();setErr(e.error||`Error ${res.status}`);setStage("input");return;}
      const data=await res.json();
      const raw=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const clean=raw.replace(/^```json\s*/i,"").replace(/^```\s*/i,"").replace(/```\s*$/,"").trim();
      const parsed=JSON.parse(clean);
      setDiff(parsed);setStage("review");
    }catch(e){setErr("Failed to analyse transcript. Please try again.");setStage("input");}
  }
  function apply(){
    setStage("applying");
    let ns=[...sections],na=[...actions];
    (diff.sectionUpdates||[]).forEach(u=>{const idx=ns.findIndex(s=>String(s.num)===String(u.num));if(idx===-1)return;const s={...ns[idx]},c=u.changes||{};if(c.status!==undefined)s.status=c.status;if(c.flag!==undefined)s.flag=c.flag;if(c.notes!==undefined)s.notes=s.notes+(s.notes?"\n\n":"")+c.notes;if(c.tasksToAdd?.length)s.tasks=[...s.tasks,...c.tasksToAdd];if(c.tasksToComplete?.length)s.tasks=s.tasks.map(t=>c.tasksToComplete.includes(t.task)?{...t,status:"Done"}:t);if(c.tasksToUpdate?.length)s.tasks=s.tasks.map(t=>{const u2=c.tasksToUpdate.find(x=>x.task===t.task);return u2?{...t,status:u2.newStatus}:t;});ns[idx]=s;});
    (diff.actionsToComplete||[]).forEach(id=>{na=na.map(a=>a.id===id?{...a,status:"Done"}:a);});
    const mid=Math.max(0,...na.map(a=>a.id));(diff.actionsToAdd||[]).forEach((a,i)=>na.push({...a,id:mid+i+1}));
    (diff.questionsToResolve||[]).forEach(id=>{na=na.map(a=>a.id===id?{...a,status:"Done"}:a);});
    const mid2=Math.max(0,...na.map(a=>a.id));(diff.questionsToAdd||[]).forEach((q,i)=>na.push({...q,id:mid2+i+1}));
    onApply(ns,na);onClose();
  }
  const cc=(diff?.sectionUpdates||[]).reduce((s,u)=>{const c=u.changes||{};return s+(c.status?1:0)+(c.flag!==undefined?1:0)+(c.notes?1:0)+(c.tasksToAdd?.length||0)+(c.tasksToComplete?.length||0)+(c.tasksToUpdate?.length||0);},(diff?.actionsToComplete?.length||0)+(diff?.actionsToAdd?.length||0)+(diff?.questionsToResolve?.length||0)+(diff?.questionsToAdd?.length||0));
  return(
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}><h2>📋 Update from sprint review</h2><button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:"var(--tt)",lineHeight:1}}>×</button></div>
        {stage==="input"&&<><p>Paste your sprint review transcript. Claude will analyse it and show a preview before applying changes.</p><textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Paste transcript here…" style={{width:"100%",height:200,marginBottom:10,fontSize:12,padding:"8px 10px",borderRadius:8,border:"0.5px solid var(--bds)"}}/>{err&&<div className="err-msg">{err}</div>}<div className="btn-row"><button className="btn-s" onClick={onClose}>Cancel</button><button className="btn-p" onClick={analyse} disabled={!text.trim()}>Analyse →</button></div></>}
        {stage==="thinking"&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,padding:"2rem 0"}}><Spinner/><div style={{fontSize:13,color:"var(--ts)"}}>Analysing transcript…</div></div>}
        {stage==="review"&&diff&&<>
          <p style={{marginBottom:8}}><strong>Summary:</strong> {diff.summary}</p>
          <p style={{marginBottom:10,color:"var(--ts)"}}>Found <strong>{cc}</strong> change{cc!==1?"s":""} to apply.</p>
          <div className="changes-list">
            {(diff.sectionUpdates||[]).flatMap((u,i)=>{const s=sections.find(x=>String(x.num)===String(u.num));const c=u.changes||{};const items=[];if(c.status)items.push(`Status → ${c.status}`);if(c.flag!==undefined)items.push(c.flag?`Flag: ${c.flag}`:"Flag cleared");if(c.notes)items.push("Notes updated");(c.tasksToAdd||[]).forEach(t=>items.push(`New task: ${t.task}`));(c.tasksToComplete||[]).forEach(t=>items.push(`Completed: ${t}`));(c.tasksToUpdate||[]).forEach(t=>items.push(`${t.task} → ${t.newStatus}`));return items.map((item,j)=><div key={`s${i}${j}`} className="change-item"><span className="change-tag" style={{background:"#E6F1FB",color:"#185FA5"}}>§{u.num}</span><span>{s?.title} — {item}</span></div>);})}
            {(diff.actionsToComplete||[]).map(id=>{const a=actions.find(x=>x.id===id);return <div key={`ac${id}`} className="change-item"><span className="change-tag" style={{background:"#EAF3DE",color:"#3B6D11"}}>Done</span><span>{a?.action||`Action #${id}`}</span></div>;})}
            {(diff.actionsToAdd||[]).map((a,i)=><div key={`aa${i}`} className="change-item"><span className="change-tag" style={{background:"#FAEEDA",color:"#633806"}}>New</span><span>{a.owner} — {a.action}</span></div>)}
            {(diff.questionsToResolve||[]).map(id=>{const q=actions.find(x=>x.id===id);return <div key={`qr${id}`} className="change-item"><span className="change-tag" style={{background:"#EAF3DE",color:"#3B6D11"}}>Resolved</span><span>{q?.action||`Q #${id}`}</span></div>;})}
            {(diff.questionsToAdd||[]).map((q,i)=><div key={`qa${i}`} className="change-item"><span className="change-tag" style={{background:"#EEEDFE",color:"#3C3489"}}>New Q</span><span>{q.action}</span></div>)}
            {cc===0&&<div className="change-item"><span style={{color:"var(--ts)",fontSize:13}}>No changes detected.</span></div>}
          </div>
          <div className="btn-row"><button className="btn-s" onClick={()=>{setStage("input");setDiff(null);}}>← Re-paste</button><button className="btn-s" onClick={onClose}>Cancel</button><button className="btn-p" onClick={apply} disabled={cc===0}>Apply {cc} change{cc!==1?"s":""}</button></div>
        </>}
        {stage==="applying"&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,padding:"2rem 0"}}><Spinner/><div style={{fontSize:13,color:"var(--ts)"}}>Applying and syncing…</div></div>}
      </div>
    </div>
  );
}

// --- Dashboard ---
function Dashboard({sections,actions,cfg}){
  const {owners}=cfg;

  const bc=pct>=70?"#1D9E75":pct>=40?"#378ADD":"#BA7517";

      <div style={{height:10,background:"var(--bp)",borderRadius:99,overflow:"hidden",border:"0.5px solid var(--bdt)"}}><div style={{height:"100%",width:`${pct}%`,background:bc,borderRadius:99}}/></div>
      <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>{[["Done",done,"#EAF3DE","#3B6D11"],["Active",actv,"#E6F1FB","#185FA5"],["Not Started",ns,"#F1EFE8","#5F5E5A"],["Blocked",blkd,"#FCEBEB","#A32D2D"]].map(([l,v,bg,c])=><span key={l} className="pill" style={{fontSize:11,padding:"3px 10px",background:bg,color:c}}>{l}: {v}</span>)}</div>
    </div>
    <div className="g4"><SC label="Total tasks" val={allT.length}/><SC label="Active tasks" val={actT.length} color="#185FA5"/><SC label="Open actions" val={openA.length} color="#633806"/><SC label="Open questions" val={openQ.length} color="#3C3489"/></div>
    <div className="two-col">
      <div className="card"><div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Active tasks</div>{actT.length===0&&<div style={{fontSize:12,color:"var(--tt)"}}>No active tasks.</div>}{actT.map((t,i)=>(<div key={i} style={{borderBottom:"0.5px solid var(--bdt)",paddingBottom:8,marginBottom:8}}><div style={{display:"flex",gap:6,marginBottom:3,flexWrap:"wrap"}}><SPill status={t.status} small/><Pill label={t.prio} bg={PS_F[t.prio]?.bg} text={PS_F[t.prio]?.text}/></div><div style={{fontSize:12,lineHeight:1.4,marginBottom:2}}>{t.task}</div><div style={{fontSize:11,color:"var(--tt)"}}>§{t.sn} {t.section}</div></div>))}</div>
      <div className="card"><div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Open actions</div>{openA.length===0&&<div style={{fontSize:12,color:"var(--tt)"}}>All actions complete!</div>}{openA.slice(0,7).map((a,i)=>(<div key={i} style={{borderBottom:"0.5px solid var(--bdt)",paddingBottom:8,marginBottom:8}}><div style={{display:"flex",gap:6,marginBottom:3,flexWrap:"wrap"}}><span className="pill" style={{fontSize:11,background:(ASC_F[a.status]||"#888")+"22",color:ASC_F[a.status]||"#888"}}>{a.status}</span><span style={{fontSize:11,color:"var(--tt)"}}>{a.due}</span></div><div style={{fontSize:12,lineHeight:1.4,marginBottom:4}}>{a.action}</div><OTag owner={a.owner} owners={owners}/></div>))}{openA.length>7&&<div style={{fontSize:11,color:"var(--ts)"}}>+{openA.length-7} more in Action Items tab</div>}</div>
    </div>
    <div className="card" style={{marginBottom:"1rem"}}>
      <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Owner workload</div>
      <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(owners.length,4)},1fr)`,gap:10}}>
        {owners.map(name=>{const d=om[name]||{total:0,done:0,actv:0};const p=d.total>0?Math.round((d.done/d.total)*100):0;const c=oc(name,owners);const myA=actions.filter(a=>a.owner.includes(name)&&a.type==="action"&&a.status!=="Done");return(<div key={name} className="card-s" style={{padding:".75rem"}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><div style={{width:24,height:24,borderRadius:"50%",background:c+"22",border:`1.5px solid ${c}66`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:c}}>{name[0]}</div><span style={{fontSize:13,fontWeight:500}}>{name}</span></div><div style={{fontSize:11,color:"var(--ts)",marginBottom:6}}>{d.total} sections · {d.actv} active · {myA.length} actions</div><div style={{height:5,background:"var(--bp)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${p}%`,background:c,borderRadius:99}}/></div><div style={{fontSize:11,color:"var(--tt)",marginTop:3}}>{p}% complete</div></div>);})}

// --- Kanban ---
function Kanban({sections,setSections,cfg}){
  const {statuses,owners}=cfg;const di=useRef(null);
  const cols=["Not Started","In Progress","In Cleanup","Done","Blocked"];
  const onDS=(e,i)=>{di.current=i;e.dataTransfer.effectAllowed="move";};
  const onDrop=(e,col)=>{e.preventDefault();if(di.current===null)return;const n=[...sections];n[di.current]={...n[di.current],status:col};setSections(n);di.current=null;};
  const onDO=e=>e.preventDefault();
  return(<div>
    <div style={{fontSize:12,color:"var(--ts)",marginBottom:12}}>Drag cards between columns or use the dropdown. Changes sync automatically.</div>
    <div className="kb-board">
      {cols.map(col=>{const cs=SS_F[col]||{bg:"#F1EFE8",text:"#5F5E5A",border:"#B4B2A9"};const colS=sections.filter(s=>s.status===col);return(
        <div key={col} className="kb-col" style={{background:"var(--bs)"}} onDragOver={onDO} onDrop={e=>onDrop(e,col)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{fontSize:12,fontWeight:500,color:cs.text}}>{col}</span><span className="pill" style={{fontSize:11,background:cs.bg,color:cs.text,border:`1px solid ${cs.border}`}}>{colS.length}</span></div>
          {colS.map(s=>{const gi=sections.findIndex(x=>x.num===s.num);const td=s.tasks.filter(t=>t.status==="Done").length,tp=s.tasks.length>0?Math.round((td/s.tasks.length)*100):0;const occ=oc(s.owner.split(/[+ ]/)[0],owners);return(
            <div key={String(s.num)} className="kb-card" style={{background:"var(--bp)"}} draggable onDragStart={e=>onDS(e,gi)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5,gap:4}}><span style={{fontSize:11,fontWeight:500,lineHeight:1.3}}>§{s.num} {s.title}</span><Pill label={s.prio} bg={PS_F[s.prio]?.bg} text={PS_F[s.prio]?.text}/></div>
              <OTag owner={s.owner} owners={owners}/>
              {s.flag&&<div style={{fontSize:10,color:"#A32D2D",background:"#FCEBEB",borderRadius:4,padding:"2px 6px",marginTop:5}}>⚑ Flagged</div>}
              <div style={{marginTop:6,fontSize:10,color:"var(--tt)",marginBottom:3}}>{td}/{s.tasks.length} tasks done</div>
              <div style={{height:3,background:"var(--bs)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${tp}%`,background:occ,borderRadius:99}}/></div>
              <div style={{marginTop:6}}><Sel value={s.status} options={statuses} onChange={v=>{const n=[...sections];n[gi]={...n[gi],status:v};setSections(n);}} small/></div>
            </div>
          );})}
          {colS.length===0&&<div style={{fontSize:11,color:"var(--tt)",textAlign:"center",padding:"1rem 0",opacity:.4}}>Drop here</div>}
        </div>
      );})}
    </div>
  </div>);}

// --- Project Plan ---
function ProjectPlan({sections,setSections,cfg}){
  const {statuses,priorities,owners}=cfg;const [open,setOpen]=useState(null);

  const updT=(si,ti,f,v)=>{const n=[...sections];const t=[...n[si].tasks];t[ti]={...t[ti],[f]:v};n[si]={...n[si],tasks:t};setSections(n);};
  const addT=si=>{const n=[...sections];n[si].tasks=[...n[si].tasks,{task:"New task",status:"Not Started"}];setSections(n);};
  const rmT=(si,ti)=>{const n=[...sections];n[si].tasks=n[si].tasks.filter((_,j)=>j!==ti);setSections(n);};
  const ownerOpts=[...owners,...owners.flatMap((a,i)=>owners.slice(i+1).map(b=>`${a} + ${b}`)),"All"];
  return(<div>
    <div className="g4"><SC label="Sections" val={sections.length}/><SC label="Prio 1" val={sections.filter(s=>s.prio==="P1").length} color="#A32D2D"/><SC label="Active" val={sections.filter(s=>["In Progress","In Cleanup","Collecting"].includes(s.status)).length} color="#185FA5"/><SC label="Done" val={sections.filter(s=>s.status==="Done").length} color="#3B6D11"/></div>
    {sections.map((s,si)=>(<div key={si} className="sec-row">

        <span style={{fontSize:12,color:"var(--tt)",minWidth:20}}>{s.num}</span>
        <span style={{fontSize:13,fontWeight:500,flex:1}}>{s.title}</span>
        <OTag owner={s.owner} owners={owners}/>
        <Sel value={s.prio} options={priorities} onChange={v=>upd(si,"prio",v)} small/>
        <Sel value={s.status} options={statuses} onChange={v=>upd(si,"status",v)} small/>
        <button onClick={()=>setOpen(open===si?null:si)} style={{fontSize:12,background:"none",border:"none",color:"var(--tt)",padding:0}}>{open===si?"▲":"▼"}</button>
      </div>
      {open===si&&(<div style={{padding:"0 1rem 1rem",borderTop:"0.5px solid var(--bdt)"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10,marginBottom:10}}>
          <div><div style={{fontSize:11,color:"var(--ts)",marginBottom:4}}>Owner</div><Sel value={s.owner} options={ownerOpts} onChange={v=>upd(si,"owner",v)}/></div>
          <div><div style={{fontSize:11,color:"var(--ts)",marginBottom:4}}>Flag / blocker</div><Txt value={s.flag} onChange={v=>upd(si,"flag",v)}/></div>
        </div>
        {s.flag&&<FlagB text={s.flag}/>}
        <div style={{fontSize:11,color:"var(--ts)",marginBottom:6}}>Tasks</div>
        {s.tasks.map((t,ti)=>(<div key={ti} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><Sel value={t.status} options={statuses} onChange={v=>updT(si,ti,"status",v)} small/><Txt value={t.task} onChange={v=>updT(si,ti,"task",v)} sty={{fontSize:12}}/><button onClick={()=>rmT(si,ti)} style={{fontSize:14,color:"#A32D2D",background:"none",border:"none",padding:"0 4px",flexShrink:0}}>×</button></div>))}
        <button style={{fontSize:12,padding:"4px 12px",borderRadius:6,border:"0.5px solid var(--bds)",background:"var(--bs)",color:"var(--ts)",marginTop:4}} onClick={()=>addT(si)}>+ Add task</button>
        <div style={{marginTop:10}}><div style={{fontSize:11,color:"var(--ts)",marginBottom:4}}>Notes</div><Txt value={s.notes} onChange={v=>upd(si,"notes",v)} multi/></div>
      </div>)}
    </div>))}
  </div>);}

// --- Action Items ---

  const rm=id=>setActions(prev=>prev.filter(a=>a.id!==id));

            {editId===a.id?<Txt value={a.due} onChange={v=>upd(a.id,"due",v)} sty={{fontSize:11,width:100}}/>:<span style={{fontSize:11,color:"var(--tt)"}}>Due: {a.due}</span>}
          </div>

          {a.dep&&editId!==a.id&&<div style={{fontSize:11,color:"#633806",background:"#FAEEDA",borderRadius:4,padding:"3px 8px",marginTop:6,display:"inline-block"}}>◆ {a.dep}</div>}
        </div>
        <div style={{display:"flex",gap:4,flexShrink:0}}>
          <button style={{fontSize:11,padding:"3px 8px",borderRadius:6,border:"0.5px solid var(--bds)",background:"none",color:"var(--ts)"}} onClick={()=>setEditId(editId===a.id?null:a.id)}>{editId===a.id?"Done":"Edit"}</button>
          <button style={{fontSize:11,padding:"3px 8px",borderRadius:6,border:"0.5px solid #F09595",background:"none",color:"#A32D2D"}} onClick={()=>rm(a.id)}>×</button>
        </div>
      </div>
    </div>))}
    <button style={{fontSize:13,padding:"7px 16px",borderRadius:8,border:"0.5px solid var(--bds)",background:"var(--bs)",color:"var(--tp)",marginTop:4}} onClick={()=>add(view)}>+ Add {view==="question"?"open question":"action item"}</button>
  </div>);}

// --- My To-Dos (cross-initiative) ---
function MyTodos({user,allInitData,cfg,onUpdate}){
  const {owners,statuses,action_statuses}=cfg;const name=user.username;const col=oc(name,owners);
  const allItems=Object.entries(allInitData).flatMap(([iid,{sections,actions,initiative}])=>{
    const tasks=sections.flatMap((s,si)=>s.tasks.map((t,ti)=>({...t,si,ti,sectionTitle:s.title,sectionNum:s.num,iid,iname:initiative.name,icolor:initiative.color,source:"task"}))).filter(t=>sections[t.si].owner.split("+").map(o=>o.trim()).includes(name));
    const acts=actions.filter(a=>a.type==="action"&&a.owner.split("+").map(o=>o.trim()).includes(name)).map(a=>({...a,iid,iname:initiative.name,icolor:initiative.color,source:"action"}));
    return [...tasks,...acts];
  });
  const open=allItems.filter(t=>t.status!=="Done"),done=allItems.filter(t=>t.status==="Done");
  function markTask(iid,si,ti,status){const d=allInitData[iid];if(!d)return;const ns=[...d.sections];const t=[...ns[si].tasks];t[ti]={...t[ti],status};ns[si]={...ns[si],tasks:t};onUpdate(iid,ns,d.actions);}
  function markAction(iid,id,status){const d=allInitData[iid];if(!d)return;const na=d.actions.map(a=>a.id===id?{...a,status}:a);onUpdate(iid,d.sections,na);}
  return(<div>
    <div style={{background:`${col}12`,border:`1px solid ${col}33`,borderRadius:12,padding:"1rem 1.25rem",marginBottom:"1.25rem",display:"flex",alignItems:"center",gap:12}}>
      <div style={{width:40,height:40,borderRadius:"50%",background:col+"22",border:`2px solid ${col}66`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:700,color:col,flexShrink:0}}>{name[0]}</div>
      <div><div style={{fontSize:15,fontWeight:500}}>{name}'s to-dos · all initiatives</div><div style={{fontSize:12,color:"var(--ts)"}}>{open.length} open · {done.length} done</div></div>
    </div>
    <div className="g4" style={{marginBottom:"1.25rem"}}><SC label="Open tasks" val={open.filter(t=>t.source==="task").length} color={col}/><SC label="Open actions" val={open.filter(t=>t.source==="action").length} color="#633806"/><SC label="Tasks done" val={done.filter(t=>t.source==="task").length} color="#3B6D11"/><SC label="Actions done" val={done.filter(t=>t.source==="action").length} color="#3B6D11"/></div>
    {open.length===0&&<div className="card" style={{textAlign:"center",padding:"2rem",color:"var(--ts)"}}><div style={{fontSize:32,marginBottom:8}}>🎉</div><div style={{fontSize:14,fontWeight:500,marginBottom:4}}>All caught up!</div><div style={{fontSize:13}}>No open tasks or action items assigned to you.</div></div>}
    {open.filter(t=>t.source==="task").length>0&&<><div style={{fontSize:13,fontWeight:500,marginBottom:8}}>Open tasks</div>
      {open.filter(t=>t.source==="task").map((t,i)=>(<div key={i} style={{background:"var(--bp)",border:"0.5px solid var(--bdt)",borderRadius:8,padding:".75rem 1rem",marginBottom:8,display:"flex",alignItems:"flex-start",gap:12}}>
        <input type="checkbox" checked={false} onChange={()=>markTask(t.iid,t.si,t.ti,"Done")} style={{width:15,height:15,cursor:"pointer",accentColor:col,marginTop:2}}/>
        <div style={{flex:1}}><div style={{fontSize:13,lineHeight:1.4,marginBottom:4}}>{t.task}</div><div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}><SPill status={t.status} small/><span style={{fontSize:11,color:"var(--tt)"}}>§{t.sectionNum} {t.sectionTitle}</span><span className="pill" style={{fontSize:10,background:t.icolor+"18",color:t.icolor,border:`1px solid ${t.icolor}33`}}>{t.iname}</span></div></div>
        <Sel value={t.status} options={statuses} onChange={v=>markTask(t.iid,t.si,t.ti,v)} small/>
      </div>))}
    </>}
    {open.filter(t=>t.source==="action").length>0&&<><div style={{fontSize:13,fontWeight:500,margin:"1rem 0 8px"}}>Open action items</div>
      {open.filter(t=>t.source==="action").map((a,i)=>(<div key={i} style={{background:"var(--bp)",border:`0.5px solid ${a.status==="Urgent"?"#F09595":"var(--bdt)"}`,borderRadius:8,padding:".75rem 1rem",marginBottom:8,display:"flex",alignItems:"flex-start",gap:12}}>
        <input type="checkbox" checked={false} onChange={()=>markAction(a.iid,a.id,"Done")} style={{width:15,height:15,cursor:"pointer",accentColor:col,marginTop:2}}/>
        <div style={{flex:1}}><div style={{fontSize:13,lineHeight:1.4,marginBottom:4}}>{a.action}</div><div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}><span className="pill" style={{fontSize:11,background:(ASC_F[a.status]||"#888")+"22",color:ASC_F[a.status]||"#888"}}>{a.status}</span><span style={{fontSize:11,color:"var(--tt)"}}>Due: {a.due}</span><span className="pill" style={{fontSize:10,background:a.icolor+"18",color:a.icolor,border:`1px solid ${a.icolor}33`}}>{a.iname}</span></div></div>
        <Sel value={a.status} options={action_statuses} onChange={v=>markAction(a.iid,a.id,v)} small/>
      </div>))}
    </>}
    {done.length>0&&<><div style={{fontSize:13,fontWeight:500,margin:"1rem 0 8px",color:"var(--ts)"}}>Completed ({done.length})</div>
      {done.map((t,i)=>(<div key={i} style={{background:"var(--bp)",border:"0.5px solid var(--bdt)",borderRadius:8,padding:".75rem 1rem",marginBottom:8,display:"flex",alignItems:"flex-start",gap:12,opacity:.6}}>
        <input type="checkbox" checked disabled style={{width:15,height:15,accentColor:col,marginTop:2}}/>
        <div style={{flex:1}}><div style={{fontSize:13,textDecoration:"line-through",color:"var(--ts)"}}>{t.source==="task"?t.task:t.action}</div><span className="pill" style={{fontSize:10,background:t.icolor+"18",color:t.icolor,border:`1px solid ${t.icolor}33`}}>{t.iname}</span></div>
      </div>))}
    </>}
  </div>);}

// --- Admin Panel ---
function AdminPanel({cfg,setCfg,initiatives,setInitiatives}){
  const [users,setUsers]=useState([]);const [loading,setLoading]=useState(true);
  const [newUser,setNewUser]=useState({username:"",password:"",role:"member"});
  const [newPw,setNewPw]=useState({});const [msg,setMsg]=useState({text:"",type:"ok"});
  const [lc,setLc]=useState(cfg);const [addVals,setAddVals]=useState({statuses:"",priorities:"",owners:"",action_statuses:""});
  const [editInit,setEditInit]=useState(null);
  const [newInit,setNewInit]=useState({name:"",description:"",icon:"📋",color:"#378ADD"});
  const COLORS=["#378ADD","#1D9E75","#7F77DD","#D85A30","#BA7517","#D4537E","#0F6E56","#E24B4A"];
  useEffect(()=>{dbGetUsers().then(u=>{setUsers(u||[]);setLoading(false);});},[]);
  function flash(text,type="ok"){setMsg({text,type});setTimeout(()=>setMsg({text:"",type:"ok"}),3500);}
  async function addUser(){if(!newUser.username||!newUser.password){flash("Please fill in name and password.","err");return;}await dbAddUser(newUser.username,newUser.password,newUser.role);const u=await dbGetUsers();setUsers(u||[]);setNewUser({username:"",password:"",role:"member"});flash(`User "${newUser.username}" added.`);}
  async function delUser(u){if(!confirm(`Remove user "${u}"?`))return;await dbDelUser(u);const us=await dbGetUsers();setUsers(us||[]);flash(`User "${u}" removed.`);}
  async function updPw(u){const p=newPw[u];if(!p)return;await dbSetPw(u,p);setNewPw(prev=>({...prev,[u]:""}));flash(`Password updated for "${u}".`);}
  async function saveCfg(){await Promise.all(Object.keys(lc).map(k=>dbSetConfig(k,lc[k])));setCfg(lc);flash("Configuration saved.");}
  function addToList(key){const v=addVals[key].trim();if(!v)return;setLc(c=>({...c,[key]:[...c[key],v]}));setAddVals(p=>({...p,[key]:"""}));}
  function rmFromList(key,i){setLc(c=>({...c,[key]:c[key].filter((_,j)=>j!==i)}));}
  async function saveInitiative(){
    if(!newInit.name.trim()){flash("Please enter a name.","err");return;}
    const id=newInit.name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
    const updated={...initiatives,list:[...initiatives.list,{id,name:newInit.name,description:newInit.description,icon:newInit.icon,color:newInit.color,archived:false}]};
    await dbSetInitiatives(updated);setInitiatives(updated);
    setNewInit({name:"",description:"",icon:"📋",color:"#378ADD"});flash(`Initiative "${newInit.name}" created.`);
  }
  async function archiveInit(id,archived){
    const updated={...initiatives,list:initiatives.list.map(i=>i.id===id?{...i,archived}:i)};
    await dbSetInitiatives(updated);setInitiatives(updated);flash(archived?"Initiative archived.":"Initiative restored.");
  }
  async function updateInit(id,changes){
    const updated={...initiatives,list:initiatives.list.map(i=>i.id===id?{...i,...changes}:i)};
    await dbSetInitiatives(updated);setInitiatives(updated);setEditInit(null);flash("Initiative updated.");
  }
  return(<div>
    <div style={{background:"#FAEEDA",border:"1px solid #EF9F27",borderRadius:8,padding:"8px 12px",marginBottom:"1.25rem",fontSize:12,color:"#633806"}}>🔒 Admin panel — visible only to admins.</div>
    {msg.text&&<div className={msg.type==="err"?"err-msg":"ok-msg"}>{msg.text}</div>}
    <div className="admin-section">
      <h3>Initiatives</h3>
      {initiatives.list.map(init=>(<div key={init.id} style={{background:"var(--bs)",borderRadius:8,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        {editInit===init.id?(<>
          <input value={init.name} onChange={e=>updateInit(init.id,{name:e.target.value})} style={{flex:1,minWidth:100,fontSize:13}}/>
          <input value={init.description||""} onChange={e=>updateInit(init.id,{description:e.target.value})} style={{flex:2,minWidth:150,fontSize:12}} placeholder="Description"/>
          <input value={init.icon||"📋"} onChange={e=>updateInit(init.id,{icon:e.target.value})} style={{width:40,fontSize:13}}/>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{COLORS.map(c=><button key={c} onClick={()=>updateInit(init.id,{color:c})} style={{width:18,height:18,borderRadius:"50%",background:c,border:init.color===c?"2px solid var(--tp)":"2px solid transparent",cursor:"pointer"}}/>)}</div>
          <button className="btn-s" style={{fontSize:11,padding:"4px 8px"}} onClick={()=>setEditInit(null)}>Done</button>
        </>):(<>
          <span style={{fontSize:18}}>{init.icon||"📋"}</span>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{init.name}</div><div style={{fontSize:11,color:"var(--ts)"}}>{init.description||"No description"}</div></div>
          <span className="pill" style={{fontSize:10,background:init.archived?"#F1EFE8":"#EAF3DE",color:init.archived?"#5F5E5A":"#3B6D11"}}>{init.archived?"Archived":"Active"}</span>
          <button className="btn-s" style={{fontSize:11,padding:"4px 8px"}} onClick={()=>setEditInit(init.id)}>Edit</button>
          {!init.archived?<button className="btn-d" style={{fontSize:11,padding:"4px 8px"}} onClick={()=>archiveInit(init.id,true)}>Archive</button>:<button className="btn-s" style={{fontSize:11,padding:"4px 8px"}} onClick={()=>archiveInit(init.id,false)}>Restore</button>}
        </>)}
      </div>))}
      <div style={{marginTop:14,padding:12,background:"var(--bs)",borderRadius:8,border:"0.5px solid var(--bdt)"}}>
        <div style={{fontSize:12,fontWeight:500,marginBottom:8}}>Create new initiative</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
          <input value={newInit.name} onChange={e=>setNewInit(p=>({...p,name:e.target.value}))} placeholder="Initiative name" style={{flex:1,minWidth:140,fontSize:13}}/>
          <input value={newInit.description} onChange={e=>setNewInit(p=>({...p,description:e.target.value}))} placeholder="Short description" style={{flex:2,minWidth:160,fontSize:12}}/>
          <input value={newInit.icon} onChange={e=>setNewInit(p=>({...p,icon:e.target.value}))} style={{width:40,fontSize:13}} placeholder="📋"/>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:"var(--ts)"}}>Color:</span>
          {COLORS.map(c=><button key={c} onClick={()=>setNewInit(p=>({...p,color:c}))} style={{width:20,height:20,borderRadius:"50%",background:c,border:newInit.color===c?"2px solid var(--tp)":"2px solid transparent",cursor:"pointer"}}/>)}
        </div>
        <button className="btn-p" style={{fontSize:12,padding:"5px 14px"}} onClick={saveInitiative}>Create initiative</button>
      </div>
    </div>
    <div className="admin-section">
      <h3>Team members</h3>
      {loading?<Spinner size={24}/>:users.map(u=>(<div key={u.username} className="user-row">
        <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:120}}><div style={{width:28,height:28,borderRadius:"50%",background:oc(u.username,[])+"22",border:`1.5px solid ${oc(u.username,[])}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:600,color:oc(u.username,[])}}>{u.username[0]}</div><span style={{fontSize:13,fontWeight:500}}>{u.username}</span><span className="pill" style={{fontSize:10,background:u.role==="admin"?"#FAEEDA":"#F1EFE8",color:u.role==="admin"?"#633806":"#5F5E5A"}}>{u.role}</span></div>
        <input type="password" value={newPw[u.username]||""} onChange={e=>setNewPw(p=>({...p,[u.username]:e.target.value}))} placeholder="New password" style={{width:140,fontSize:12}}/>
        <button className="btn-p" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>updPw(u.username)}>Update</button>
        {u.role!=="admin"&&<button className="btn-d" onClick={()=>delUser(u.username)}>Remove</button>}
      </div>))}
      <div style={{marginTop:14,padding:12,background:"var(--bs)",borderRadius:8}}>
        <div style={{fontSize:12,fontWeight:500,marginBottom:8}}>Add new user</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <input value={newUser.username} onChange={e=>setNewUser(p=>({...p,username:e.target.value}))} placeholder="Name" style={{flex:1,minWidth:100,fontSize:12}}/>
          <input type="password" value={newUser.password} onChange={e=>setNewUser(p=>({...p,password:e.target.value}))} placeholder="Password" style={{flex:1,minWidth:100,fontSize:12}}/>
          <Sel value={newUser.role} options={["member","admin"]} onChange={v=>setNewUser(p=>({...p,role:v}))} small/>
          <button className="btn-p" style={{fontSize:12,padding:"5px 14px"}} onClick={addUser}>Add</button>
        </div>
      </div>
    </div>
    <div className="admin-section">
      <h3>Configuration</h3>
      {[{key:"statuses",label:"Section statuses"},{key:"priorities",label:"Priority levels"},{key:"owners",label:"Owner options"},{key:"action_statuses",label:"Action item statuses"}].map(({key,label})=>(<div key={key} style={{marginBottom:16}}>
        <div style={{fontSize:12,color:"var(--ts)",marginBottom:6}}>{label}</div>
        <div className="tag-row" style={{marginBottom:6}}>{lc[key].map((v,i)=>(<div key={i} className="tag-item"><span>{v}</span><button onClick={()=>rmFromList(key,i)} style={{background:"none",border:"none",color:"#A32D2D",fontSize:14,lineHeight:1,padding:0}}>×</button></div>))}</div>
        <div style={{display:"flex",gap:6}}><input value={addVals[key]} onChange={e=>setAddVals(p=>({...p,[key]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addToList(key)} placeholder={`Add…`} style={{fontSize:12,flex:1}}/><button className="btn-s" style={{fontSize:12,padding:"4px 10px"}} onClick={()=>addToList(key)}>Add</button></div>
      </div>))}
      <button className="btn-p" onClick={saveCfg}>Save configuration</button>
    </div>
  </div>);}

// Wrappers that load cross-initiative data for My To-Dos and pass admin through
function MyTodosWrapper({user,cfg,currentIid,currentSections,currentActions,onCurrentUpdate}){
  const [allData,setAllData]=useState(null);
  useEffect(()=>{
    const d={[currentIid]:{sections:currentSections,actions:currentActions,initiative:{name:"Current",color:"#378ADD"}}};
    setAllData(d);
  },[currentSections,currentActions]);
  function handleUpdate(iid,ns,na){if(iid===currentIid)onCurrentUpdate(ns,na);}
  if(!allData)return <div style={{padding:"2rem",textAlign:"center"}}><Spinner/></div>;
  return <MyTodos user={user} allInitData={allData} cfg={cfg} onUpdate={handleUpdate}/>;
}
function AdminPanelWrapper({cfg}){return <div style={{padding:"1rem",background:"var(--bs)",borderRadius:8,fontSize:13,color:"var(--ts)"}}>Go to the initiatives screen to manage initiatives, users, and configuration.</div>;}

// --- Root ---
function App(){
  const [user,setUser]=useState(null);
  const [appLoaded,setAppLoaded]=useState(false);
  const [initiatives,setInitiatives]=useState({list:[]});
  const [cfg,setCfg]=useState(DEF_CFG);
  const [selectedInit,setSelectedInit]=useState(null);
  const [sections,setSectionsRaw]=useState([]);
  const [actions,setActionsRaw]=useState([]);
  const [sync,setSync]=useState("idle");
  const [showImport,setShowImport]=useState(false);
  const [showChangePw,setShowChangePw]=useState(false);
  const [view,setView]=useState("picker"); // picker | initiative | admin
  const timer=useRef(null);

  useEffect(()=>{const s=sessionStorage.getItem("sep_user");if(s){try{setUser(JSON.parse(s));}catch(e){}}setAppLoaded(true);},[]);

  useEffect(()=>{
    if(!user)return;
    Promise.all([dbGetInitiatives(),dbGetConfig()]).then(([inits,cfgRows])=>{
      setInitiatives(inits||{list:[]});
      if(cfgRows?.length){const c={...DEF_CFG};cfgRows.forEach(r=>{if(c[r.key]!==undefined)c[r.key]=r.value;});setCfg(c);}
    });
  },[user]);

  const persist=useCallback((iid,s,a)=>{
    if(timer.current)clearTimeout(timer.current);
    setSync("syncing");
    timer.current=setTimeout(()=>{dbSetState(iid,{sections:s,actions:a}).then(()=>{setSync("saved");setTimeout(()=>setSync("idle"),3000);}).catch(()=>setSync("error"));},900);
  },[]);

  async function selectInitiative(init){
    setSelectedInit(init);
    const state=await dbGetState(init.id);
    if(state?.sections){setSectionsRaw(state.sections);setActionsRaw(state.actions||[]);}
    else{
      // New initiative — seed with defaults if it's the SE playbook, else empty
      const s=init.id==="se-playbook"?DEF_SECTIONS:[];
      const a=init.id==="se-playbook"?DEF_ACTIONS:[];
      setSectionsRaw(s);setActionsRaw(a);
    }
    setView("initiative");
  }

  const setSections=v=>{setSectionsRaw(v);if(selectedInit)persist(selectedInit.id,v,actions);};
  const setActions=v=>{setActionsRaw(v);if(selectedInit)persist(selectedInit.id,sections,v);};
  function logout(){sessionStorage.removeItem("sep_user");setUser(null);setSelectedInit(null);setView("picker");}

  if(!appLoaded)return null;
  if(!user)return <LoginScreen onLogin={u=>setUser(u)}/>;

  const isAdmin=user.role==="admin";

  if(view==="initiative"&&selectedInit){
    return(
      <div>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        {showChangePw&&<ChangePwModal user={user} onClose={changed=>{setShowChangePw(false);if(changed)logout();}}/>}
        <InitiativeView
          initiative={selectedInit} sections={sections} setSections={setSections}
          actions={actions} setActions={setActions} cfg={cfg} user={user} sync={sync}
          onBack={()=>setView("picker")} onImport={()=>setShowImport(true)}
          showImport={showImport} setShowImport={setShowImport}
          onChangePw={()=>setShowChangePw(true)} onLogout={logout}
        />
      </div>
    );
  }

  return(
    <div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      {showChangePw&&<ChangePwModal user={user} onClose={changed=>{setShowChangePw(false);if(changed)logout();}}/>}
      {view==="admin"&&isAdmin?(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1.5rem"}}>
            <button onClick={()=>setView("picker")} style={{background:"none",border:"0.5px solid var(--bds)",borderRadius:"8px",padding:"5px 10px",fontSize:12,color:"var(--ts)",cursor:"pointer"}}>← Back</button>
            <h1 style={{fontSize:18,fontWeight:500}}>Admin panel</h1>
          </div>
          <AdminPanel cfg={cfg} setCfg={setCfg} initiatives={initiatives} setInitiatives={setInitiatives}/>
        </div>
      ):(
        <InitiativePicker
          initiatives={initiatives.list||[]}
          onSelect={selectInitiative}
          onManage={()=>setView("admin")}
          user={user}
          onLogout={logout}
          onChangePw={()=>setShowChangePw(true)}
        />
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
